<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Wisch-Spiel: Ausweichen & Sammeln</title>
<style>
:root{
--bg:#f7fbff;
--text:#203040;
--good:#3aa6ff;
--player:#ff7bb0;
--ob1:#ffa652;
--ob2:#ffcf5a;
--ob3:#8bd17c;
--gem:#7d9cff;
--shield:#7ee7d8;
--danger:#ff6b6b;
--panel:#ffffff;
--shadow:rgba(0,0,0,0.12);
}
*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
html,body{margin:0;height:100%; background:var(--bg); color:var(--text); font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;}
#game{
position:relative;
margin:0 auto;
width:100vw;
height:100vh;
overflow:hidden;
touch-action:none; /* wichtig für iPad-Wischsteuerung */
background: linear-gradient(180deg,#f9fcff 0%, #eef7ff 100%);
}
/* Spielfigur */
.player{
position:absolute;
width:52px; height:52px;
left:50%; top:70%;
margin-left:-26px; margin-top:-26px;
border-radius:50%;
background: radial-gradient(circle at 35% 35%, #ffc3d6 0%, var(--player) 60%, #e95e93 100%);
box-shadow: 0 8px 16px var(--shadow), inset 0 4px 8px rgba(255,255,255,0.7);
border:2px solid rgba(255,255,255,0.8);
}
.player.shielded{
box-shadow: 0 8px 16px var(--shadow), 0 0 0 6px rgba(126,231,216,0.35), inset 0 4px 8px rgba(255,255,255,0.7);
}
/* Hindernisse */
.ob{
position:absolute;
border-radius:12px;
box-shadow:0 6px 12px var(--shadow);
}
/* Sammelobjekt (Punkt) */
.gem{
position:absolute;
width:26px; height:26px;
border-radius:8px;
background: linear-gradient(145deg, #a9bfff, var(--gem));
box-shadow:0 4px 10px var(--shadow), inset 0 2px 4px rgba(255,255,255,0.7);
transform: rotate(45deg);
}
/* Power-Up: Schild */
.shield{
position:absolute;
width:30px; height:30px;
border-radius:50%;
background: radial-gradient(circle at 35% 35%, #c8fff3 0%, var(--shield) 70%, #52d8c4 100%);
box-shadow:0 4px 10px var(--shadow), inset 0 2px 6px rgba(255,255,255,0.8);
}
/* UI */ #ui{ position:absolute; left:0; top:0; width:100%; padding:12px 14px; display:flex; align-items:center; justify-content:space-between; pointer-events:none; } .badge{ background:var(--panel); box-shadow:0 6px 16px var(--shadow); border-radius:12px; padding:8px 12px; font-weight:700; font-size:16px; pointer-events:auto; } #leftBadges, #rightBadges{display:flex; gap:8px; align-items:center;} #message{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); background:var(--panel); padding:18px 16px; border-radius:16px; box-shadow:0 10px 24px var(--shadow); min-width: 260px; text-align:center; } #message.hidden{display:none;} #message h3{margin:0 0 8px 0; font-size:20px} #message p{margin:0 0 12px 0; font-size:14px} .btn{ display:inline-block; margin:6px; padding:10px 14px; border-radius:12px; border:none; font-weight:700; font-size:15px; background:linear-gradient(180deg,#50c2ff,#2aa6ff); color:#fff; box-shadow:0 6px 12px var(--shadow); } .btn:active{transform:translateY(1px);} #wave{font-weight:700;} #pauseBtn{background:linear-gradient(180deg,#c2c8d0,#aeb6bf);} #how{ position:absolute; left:50%; bottom:16px; transform:translateX(-50%); background:rgba(255,255,255,0.9); padding:10px 12px; border-radius:12px; box-shadow:0 6px 16px var(--shadow); font-size:14px; } </style>
</head>
<body>
<div id="game" aria-label="Wisch-Spiel">
<div id="ui">
<div id="leftBadges">
<div class="badge">Punkte: <span id="score">0</span></div>
<div class="badge">Rekord: <span id="high">0</span></div>
</div>
<div id="rightBadges">
<div class="badge">Welle: <span id="wave">1</span></div>
<div class="badge">Leben: <span id="lives">3</span></div>
<button id="pauseBtn" class="badge btn" style="pointer-events:auto;">Pause</button>
</div>
</div>
<div id="how">Ziehe die Kugel mit dem Finger. Weiche Hindernissen aus, sammle Rhomben, nimm das Schild!</div>
<div id="message" class="">
<h3>Wisch & Weiche</h3>
<p>Ziehe die Kugel mit dem Finger. Sammle Rhomben für Punkte. Schild schützt kurz.</p>
<button id="startBtn" class="btn">Start</button>
</div>
</div> <script>
(function(){
const game = document.getElementById('game');
const scoreEl = document.getElementById('score');
const highEl = document.getElementById('high');
const livesEl = document.getElementById('lives');
const waveEl = document.getElementById('wave');
const msg = document.getElementById('message');
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');
const how = document.getElementById('how');

let player, running=false, paused=false, lastT=0;
let score=0, lives=3, wave=1;
let high=0;
let obstacles=[], gems=[], powerups=[];
let speed=2.2; // Basisgeschwindigkeit
let spawnTimer=0, gemTimer=0, powerTimer=0;
let shieldTime=0; // ms
let touchId=null;
let targetX=0, targetY=0;
let vw=game.clientWidth, vh=game.clientHeight;
let dtTotal=0;

// Highscore laden
function loadHigh(){
try{
const v = localStorage.getItem('wisch_highscore');
high = v ? parseInt(v,10) : 0;
}catch(e){ high = 0; }
highEl.textContent = high;
}
function saveHigh(){
try{ localStorage.setItem('wisch_highscore', String(high)); }catch(e){}
}

function createPlayer(){
if(player){player.remove();}
player = document.createElement('div');
player.className='player';
game.appendChild(player);
const x = vw*0.5, y = vh*0.7;
setPos(player, x-26, y-26);
targetX = x-26; targetY = y-26;
}

function setPos(el, x, y){
el.style.left = x+'px';
el.style.top = y+'px';
}
function rand(min,max){return Math.random()*(max-min)+min;}
function rect(el){
const r = el.getBoundingClientRect();
const rg = game.getBoundingClientRect();
return {x:r.left-rg.left, y:r.top-rg.top, w:r.width, h:r.height};
}
function collide(a,b){
return !(a.x+a.w < b.x || b.x+b.w < a.x || a.y+a.h < b.y || b.y+b.h < a.y);
}

function spawnObstacle(){
const w = rand(40, 120);
const h = rand(18, 36);
const x = rand(8, vw - w - 8);
const y = -h - 10;
const ob = document.createElement('div');
ob.className='ob';
ob.style.width = w+'px';
ob.style.height = h+'px';
ob.style.left = x+'px';
ob.style.top = y+'px';
// Farbe wechseln
const colors = ['var(--ob1)','var(--ob2)','var(--ob3)'];
const c = colors[Math.floor(rand(0, colors.length))];
ob.style.background = 'linear-gradient(180deg, rgba(255,255,255,0.9), '+c+')';
ob.dataset.vy = (speed + rand(0.4,1.2)).toFixed(2);
game.appendChild(ob);
obstacles.push(ob);
}
function spawnGem(){
const g = document.createElement('div');
g.className='gem';
const x = rand(12, vw-12-26);
const y = -30;
g.style.left = x+'px';
g.style.top = y+'px';
g.dataset.vy = (speed + 1.0).toFixed(2);
game.appendChild(g);
gems.push(g);
}
function spawnShield(){
const s = document.createElement('div');
s.className='shield';
const x = rand(12, vw-12-30);
const y = -34;
s.style.left = x+'px';
s.style.top = y+'px';
s.dataset.vy = (speed + 0.8).toFixed(2);
game.appendChild(s);
powerups.push(s);
}

function reset(){
[...obstacles, ...gems, ...powerups].forEach(e=>e.remove());
obstacles=[]; gems=[]; powerups=[];
score=0; lives=3; wave=1; speed=2.2;
shieldTime=0; spawnTimer=0; gemTimer=0; powerTimer=0; dtTotal=0;
scoreEl.textContent=score;
livesEl.textContent=lives;
waveEl.textContent=wave;
createPlayer();
how.style.opacity='1';
loadHigh();
}

function startGame(){
reset();
running=true; paused=false;
msg.classList.add('hidden');
lastT = performance.now();
requestAnimationFrame(loop);
}

function endGame(){
running=false;
// Highscore prüfen
if(score > high){
high = score;
saveHigh();
}
highEl.textContent = high;

msg.classList.remove('hidden');
msg.innerHTML = "<h3>Spiel Ende</h3>"
+ "<p>Punkte: <strong>"+score+"</strong> – Welle: "+wave+"</p>"
+ "<p>Rekord: <strong>"+high+"</strong></p>"
+ "<button class='btn' id='again'>Nochmal</button>";
document.getElementById('again').addEventListener('click', startGame, {once:true});
}

function maybeUpdateHighDuringRun(){
// Optional: Live-Update, falls man gerade einen neuen Rekord schlägt
if(score > high){
high = score;
highEl.textContent = high;
saveHigh();
}
}

function update(dt){
// Schwierigkeit: Wellen basierend auf Zeit und Score
const timeFactor = Math.min(1 + dtTotal/30000, 3); // bis 3x
speed = 2.2 * timeFactor + wave*0.3;

// Spawn-Logik
spawnTimer += dt;
gemTimer += dt;
powerTimer += dt;

const spawnEvery = Math.max(300 - wave*8, 120); // ms
const gemEvery = Math.max(800 - wave*10, 420);
const powerEvery = Math.max(5000 - wave*80, 2400);

while(spawnTimer >= spawnEvery){ spawnTimer -= spawnEvery; spawnObstacle(); }
if(gemTimer >= gemEvery){ gemTimer = 0; spawnGem(); }
if(powerTimer >= powerEvery){ powerTimer = 0; if(Math.random() < 0.6) spawnShield(); }

// Bewegen
const moveElems = (arr)=>{
for(let i=arr.length-1;i>=0;i--){
const e = arr[i];
const vy = parseFloat(e.dataset.vy || speed);
const y = parseFloat(e.style.top) + vy;
e.style.top = y+'px';
if(y > vh + 60){
e.remove(); arr.splice(i,1);
}
}
};
moveElems(obstacles);
moveElems(gems);
moveElems(powerups);

// Spieler sanft zum Finger-Ziel bewegen
if(player){
const px = parseFloat(player.style.left);
const py = parseFloat(player.style.top);
const nx = px + (targetX - px) * 0.25;
const ny = py + (targetY - py) * 0.25;
const clampedX = Math.max(0, Math.min(vw - player.offsetWidth, nx));
const clampedY = Math.max(0, Math.min(vh - player.offsetHeight, ny));
setPos(player, clampedX, clampedY);
}

// Kollisionen und Punkte
if(player){
const pr = rect(player);

// Gems sammeln
for(let i=gems.length-1;i>=0;i--){
const gr = rect(gems[i]);
if(collide(pr, gr)){
score += 5;
scoreEl.textContent = score;
gems[i].remove(); gems.splice(i,1);
maybeUpdateHighDuringRun();
}
}
// Schild aufnehmen
for(let i=powerups.length-1;i>=0;i--){
const sr = rect(powerups[i]);
if(collide(pr, sr)){
shieldTime = 3000; // 3 Sekunden Schutz
player.classList.add('shielded');
powerups[i].remove(); powerups.splice(i,1);
}
}
// Hindernisse
for(let i=obstacles.length-1;i>=0;i--){
const or = rect(obstacles[i]);
if(collide(pr, or)){
if(shieldTime > 0){
shieldTime = Math.max(0, shieldTime - 800);
obstacles[i].style.transform = 'rotate(8deg)';
obstacles[i].style.background = 'linear-gradient(180deg, rgba(255,255,255,0.9), var(--danger))';
}else{
obstacles[i].remove(); obstacles.splice(i,1);
lives--;
livesEl.textContent = lives;
shieldTime = 1200; // kurze Unverwundbarkeit
player.classList.add('shielded');
if(lives <= 0){ endGame(); return; }
}
}
}
}

// Schildzeit herunterzählen
if(shieldTime > 0){
shieldTime -= dt;
if(shieldTime <= 0){
shieldTime = 0;
player.classList.remove('shielded');
}
}

// Wellen-Logik
if(score > 0 && score % 40 === 0){
if(!update._lastWaveScore || score > update._lastWaveScore){
wave++;
waveEl.textContent = wave;
update._lastWaveScore = score;
flashWave();
}
}
}

function flashWave(){
const w = document.createElement('div');
w.textContent = 'Welle '+wave;
w.style.position='absolute';
w.style.left='50%'; w.style.top='40%'; w.style.transform='translate(-50%,-50%)';
w.style.padding='10px 14px';
w.style.borderRadius='12px';
w.style.background='rgba(255,255,255,0.9)';
w.style.boxShadow='0 8px 16px rgba(0,0,0,0.15)';
w.style.fontWeight='800';
game.appendChild(w);
setTimeout(()=>{ w.style.transition='opacity 0.6s'; w.style.opacity='0'; }, 20);
setTimeout(()=>{ w.remove(); }, 800);
}

function loop(t){
if(!running){return;}
if(paused){ lastT = t; requestAnimationFrame(loop); return; }
const dt = Math.min(50, t - lastT); // max 50ms-Schritte
lastT = t;
dtTotal += dt;
update(dt);
requestAnimationFrame(loop);
}

// Touch-/Maussteuerung
function onTouchStart(e){
const p = e.touches ? e.touches[0] : e;
touchId = p.identifier ?? 'mouse';
moveTarget(p.clientX, p.clientY);
how.style.opacity='0.4';
}
function onTouchMove(e){
const p = findTouch(e, touchId);
if(!p) return;
moveTarget(p.clientX, p.clientY);
e.preventDefault();
}
function onTouchEnd(e){
if(e.changedTouches){
for(const t of e.changedTouches){
if(t.identifier===touchId){ touchId=null; break; }
}
} else { touchId=null; }
}
function findTouch(e,id){
if(!e.touches) return e;
for(const t of e.touches){ if(t.identifier===id) return t; }
return null;
}
function moveTarget(cx, cy){
const r = game.getBoundingClientRect();
const x = cx - r.left - player.offsetWidth/2;
const y = cy - r.top - player.offsetHeight/2;
targetX = Math.max(0, Math.min(vw - player.offsetWidth, x));
targetY = Math.max(0, Math.min(vh - player.offsetHeight, y));
}

// Resize
function onResize(){
vw = game.clientWidth; vh = game.clientHeight;
}
window.addEventListener('resize', onResize);

// Event-Listener
game.addEventListener('touchstart', onTouchStart, {passive:true});
game.addEventListener('touchmove', onTouchMove, {passive:false});
game.addEventListener('touchend', onTouchEnd, {passive:true});
game.addEventListener('mousedown', onTouchStart);
window.addEventListener('mousemove', onTouchMove);
window.addEventListener('mouseup', onTouchEnd);

pauseBtn.addEventListener('click', ()=>{
if(!running) return;
paused = !paused;
pauseBtn.textContent = paused ? 'Weiter' : 'Pause';
});

startBtn.addEventListener('click', startGame);

// Start im Pausen-Bildschirm
loadHigh();
reset();
})();
</script> </body>
</html>
