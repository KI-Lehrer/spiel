<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tic-Tac-Toe – Schwarz/Weiss</title>
<style>
:root {
  --bg: #ffffff;
  --fg: #000000;
  --muted: #888888;
  --line: #000000;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0; padding: 0; height: 100%;
  background: var(--bg); color: var(--fg);
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

.wrap {
  max-width: 560px;
  margin: 0 auto;
  padding: 16px 16px 36px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

h1 {
  font-size: 28px;
  margin: 8px 0 4px;
  letter-spacing: .3px;
}

.bar {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.chip, button {
  border: 1px solid var(--fg);
  background: #fff;
  color: var(--fg);
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s, color 0.12s, transform 0.08s;
}

button:active { transform: scale(0.97); }

.chip.active {
  background: #000;
  color: #fff;
}

.group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* Schwierigkeit – nur sichtbar im CPU-Modus */
#diffGroup {
  display: none;
}
#diffGroup.visible {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.status {
  border: 1px solid var(--fg);
  border-radius: 12px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}

#turnInfo {
  font-size: 16px;
  font-weight: 600;
  min-width: 120px;
}

.score {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
  font-size: 15px;
}

.score span {
  padding: 6px 10px;
  border: 1px solid var(--fg);
  border-radius: 8px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}

/* Spielfeld */
.board {
  width: 100%;
  aspect-ratio: 1 / 1;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  border: 2px solid var(--fg);
  border-radius: 14px;
  overflow: hidden;
  background: var(--fg);
  touch-action: manipulation;
}

.cell {
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(38px, 14vw, 80px);
  font-weight: 700;
  user-select: none;
  cursor: pointer;
  transition: background 0.12s ease;
  border: 1px solid var(--fg);
  position: relative;
}

.cell:hover:not(.disabled) {
  background: #f2f2f2;
}

.cell.disabled {
  cursor: default;
}

.cell.win-cell {
  background: #000;
  color: #fff;
}

/* Reset-Buttons */
.actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.actions button {
  flex: 1;
  min-width: 120px;
}

/* Ergebnis-Overlay */
#resultOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 18px;
  z-index: 100;
  text-align: center;
  padding: 24px;
}

#resultOverlay.show {
  display: flex;
}

#resultEmoji {
  font-size: 72px;
  line-height: 1;
}

#resultText {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -.5px;
}

#resultSub {
  font-size: 17px;
  color: var(--muted);
}

#resultOverlay button {
  padding: 14px 36px;
  font-size: 18px;
  font-weight: 700;
  border-radius: 12px;
}

/* Hint */
.hint {
  font-size: 13px;
  color: #666;
  margin-top: 2px;
  text-align: center;
}

footer {
  margin-top: 4px;
  font-size: 13px;
  color: #999;
  text-align: center;
}

/* Animiertes X / O */
@keyframes popIn {
  0%   { transform: scale(0.4); opacity: 0; }
  70%  { transform: scale(1.15); opacity: 1; }
  100% { transform: scale(1);    opacity: 1; }
}

.cell.placed .symbol {
  display: inline-block;
  animation: popIn 0.2s ease forwards;
}
</style>
</head>
<body>
<div class="wrap">
  <h1>Tic-Tac-Toe</h1>

  <!-- Modus-Auswahl -->
  <div class="bar" role="group" aria-label="Spielmodus">
    <div class="chip active" id="modePVP" role="button" tabindex="0"
         aria-pressed="true">2 Spieler</div>
    <div class="chip" id="modeCPU" role="button" tabindex="0"
         aria-pressed="false">Gegen Computer</div>
    <div id="diffGroup" aria-label="Schwierigkeit">
      <div class="chip active" id="diffEasy" role="button" tabindex="0"
           aria-pressed="true">Einfach</div>
      <div class="chip" id="diffMedium" role="button" tabindex="0"
           aria-pressed="false">Mittel</div>
      <div class="chip" id="diffHard" role="button" tabindex="0"
           aria-pressed="false">Schwer</div>
    </div>
  </div>

  <!-- Status -->
  <div class="status">
    <div id="turnInfo" aria-live="polite">Am Zug: X</div>
    <div class="score">
      <span id="scoreX">X: 0</span>
      <span id="scoreD">U: 0</span>
      <span id="scoreO">O: 0</span>
    </div>
  </div>

  <!-- Spielfeld -->
  <div class="board" id="board" role="grid">
    <div class="cell" data-id="0" role="gridcell" aria-label="Feld 1"></div>
    <div class="cell" data-id="1" role="gridcell" aria-label="Feld 2"></div>
    <div class="cell" data-id="2" role="gridcell" aria-label="Feld 3"></div>
    <div class="cell" data-id="3" role="gridcell" aria-label="Feld 4"></div>
    <div class="cell" data-id="4" role="gridcell" aria-label="Feld 5"></div>
    <div class="cell" data-id="5" role="gridcell" aria-label="Feld 6"></div>
    <div class="cell" data-id="6" role="gridcell" aria-label="Feld 7"></div>
    <div class="cell" data-id="7" role="gridcell" aria-label="Feld 8"></div>
    <div class="cell" data-id="8" role="gridcell" aria-label="Feld 9"></div>
  </div>

  <!-- Aktionen -->
  <div class="actions">
    <button id="btnReset" title="Nur diese Runde neu starten">Neue Runde</button>
    <button id="btnResetAll" title="Alle Punkte zurücksetzen">Punkte zurücksetzen</button>
  </div>

  <p class="hint" id="hintText">Tippe auf ein Feld zum Spielen – iPad-freundlich ✓</p>
  <footer>Schwarz/Weiss · 3 Schwierigkeitsstufen · 2-Spieler & CPU</footer>
</div>

<!-- Ergebnis-Overlay -->
<div id="resultOverlay" role="dialog" aria-modal="true" aria-label="Spielergebnis">
  <div id="resultEmoji">🎉</div>
  <div id="resultText">X gewinnt!</div>
  <div id="resultSub"></div>
  <button id="btnNext">Nächste Runde</button>
</div>

<script>
(function () {
  "use strict";

  // ── DOM ──────────────────────────────────────────────────────────────────
  const boardEl    = document.getElementById('board');
  const cells      = Array.from(boardEl.querySelectorAll('.cell'));
  const turnInfoEl = document.getElementById('turnInfo');
  const scoreXEl   = document.getElementById('scoreX');
  const scoreDEl   = document.getElementById('scoreD');
  const scoreOEl   = document.getElementById('scoreO');
  const resultOL   = document.getElementById('resultOverlay');
  const resultEmoji= document.getElementById('resultEmoji');
  const resultText = document.getElementById('resultText');
  const resultSub  = document.getElementById('resultSub');
  const btnReset   = document.getElementById('btnReset');
  const btnResetAll= document.getElementById('btnResetAll');
  const btnNext    = document.getElementById('btnNext');
  const modePVP    = document.getElementById('modePVP');
  const modeCPU    = document.getElementById('modeCPU');
  const diffGroup  = document.getElementById('diffGroup');
  const diffEasy   = document.getElementById('diffEasy');
  const diffMedium = document.getElementById('diffMedium');
  const diffHard   = document.getElementById('diffHard');
  const hintEl     = document.getElementById('hintText');

  // ── Zustand ──────────────────────────────────────────────────────────────
  let board    = Array(9).fill('');
  let current  = 'X';
  let locked   = false;
  let mode     = 'PVP';       // 'PVP' oder 'CPU'
  let difficulty = 'easy';    // 'easy' | 'medium' | 'hard'
  let scores   = { X: 0, O: 0, D: 0 };

  // ── Gewinnlinien ─────────────────────────────────────────────────────────
  const WIN_LINES = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  // ── Tap-Helper ───────────────────────────────────────────────────────────
  function addTap(el, handler) {
    el.addEventListener('touchend', e => {
      e.preventDefault();
      if (!e.cancelable) return;
      handler(e);
    }, { passive: false });
    el.addEventListener('click', handler);
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handler(e); }
    });
  }

  // ── Modus-Chips ──────────────────────────────────────────────────────────
  addTap(modePVP, () => setMode('PVP'));
  addTap(modeCPU, () => setMode('CPU'));
  addTap(diffEasy,   () => setDiff('easy'));
  addTap(diffMedium, () => setDiff('medium'));
  addTap(diffHard,   () => setDiff('hard'));

  function setMode(m) {
    mode = m;
    modePVP.classList.toggle('active', m === 'PVP');
    modePVP.setAttribute('aria-pressed', m === 'PVP');
    modeCPU.classList.toggle('active', m === 'CPU');
    modeCPU.setAttribute('aria-pressed', m === 'CPU');
    diffGroup.classList.toggle('visible', m === 'CPU');
    hintEl.textContent = m === 'CPU'
      ? 'Du spielst als X – der Computer ist O.'
      : 'Tippe auf ein Feld zum Spielen – iPad-freundlich ✓';
    newRound(false);
  }

  function setDiff(d) {
    difficulty = d;
    [diffEasy, diffMedium, diffHard].forEach(c => {
      c.classList.remove('active');
      c.setAttribute('aria-pressed', 'false');
    });
    const map = { easy: diffEasy, medium: diffMedium, hard: diffHard };
    map[d].classList.add('active');
    map[d].setAttribute('aria-pressed', 'true');
    newRound(false);
  }

  // ── Zuginfo ──────────────────────────────────────────────────────────────
  function updateTurnText() {
    if (mode === 'CPU') {
      turnInfoEl.textContent = current === 'X' ? 'Am Zug: X (Du)' : 'Am Zug: O (Computer)';
    } else {
      const diff = difficulty === 'easy' ? 'einfach' : difficulty === 'medium' ? 'mittel' : 'schwer';
      turnInfoEl.textContent = 'Am Zug: ' + current;
    }
  }

  // ── Brett zeichnen ───────────────────────────────────────────────────────
  function drawBoard(winLine) {
    cells.forEach((c, i) => {
      const val = board[i];
      c.classList.toggle('disabled', locked || val !== '');
      c.classList.toggle('win-cell', !!(winLine && winLine.includes(i)));
      if (val && !c.querySelector('.symbol')) {
        c.classList.add('placed');
        const s = document.createElement('span');
        s.className = 'symbol';
        s.textContent = val;
        c.innerHTML = '';
        c.appendChild(s);
      } else if (!val) {
        c.innerHTML = '';
        c.classList.remove('placed', 'win-cell');
      }
      c.setAttribute('aria-label', 'Feld ' + (i+1) + (val ? ': ' + val : ''));
    });
  }

  // ── Gewinncheck ──────────────────────────────────────────────────────────
  function checkWinner(bd) {
    for (const [a, b, c] of WIN_LINES) {
      if (bd[a] && bd[a] === bd[b] && bd[a] === bd[c]) return { winner: bd[a], line: [a,b,c] };
    }
    if (bd.every(v => v !== '')) return { winner: 'D', line: null };
    return null;
  }

  // ── Zug ausführen ────────────────────────────────────────────────────────
  function makeMove(idx) {
    if (locked || board[idx] !== '') return;
    board[idx] = current;
    const result = checkWinner(board);
    if (result) {
      drawBoard(result.line);
      endGame(result);
    } else {
      current = current === 'X' ? 'O' : 'X';
      updateTurnText();
      drawBoard(null);
      if (mode === 'CPU' && current === 'O') {
        locked = true;
        setTimeout(cpuMove, 300);
      }
    }
  }

  // ── Zellen-Klick ─────────────────────────────────────────────────────────
  cells.forEach(c => {
    addTap(c, () => {
      if (mode === 'CPU' && current === 'O') return;
      makeMove(parseInt(c.dataset.id));
    });
  });

  // ── Spiel beenden ────────────────────────────────────────────────────────
  function endGame(result) {
    locked = true;
    scores[result.winner]++;
    updateScores();

    if (result.winner === 'D') {
      resultEmoji.textContent = '🤝';
      resultText.textContent  = 'Unentschieden!';
      resultSub.textContent   = 'Gut gespielt – niemand gewinnt.';
    } else {
      resultEmoji.textContent = result.winner === 'X' ? '🥇' : (mode === 'CPU' ? '🤖' : '🥇');
      const name = mode === 'CPU'
        ? (result.winner === 'X' ? 'Du gewinnst! 🎉' : 'Computer gewinnt!')
        : result.winner + ' gewinnt!';
      resultText.textContent = name;
      resultSub.textContent  = 'Stand: X ' + scores.X + ' – O ' + scores.O + ' – U ' + scores.D;
    }
    resultOL.classList.add('show');
  }

  function updateScores() {
    scoreXEl.textContent = 'X: ' + scores.X;
    scoreDEl.textContent = 'U: ' + scores.D;
    scoreOEl.textContent = 'O: ' + scores.O;
  }

  // ── Neue Runde ───────────────────────────────────────────────────────────
  function newRound(keepScores = true) {
    board    = Array(9).fill('');
    current  = 'X';
    locked   = false;
    if (!keepScores) scores = { X: 0, O: 0, D: 0 };
    updateScores();
    updateTurnText();
    drawBoard(null);
    resultOL.classList.remove('show');
  }

  btnReset.addEventListener('click', () => newRound(true));
  btnNext.addEventListener('click', () => newRound(true));
  btnResetAll.addEventListener('click', () => newRound(false));

  // ════════════════════════════════════════════════════════════════════════
  //  CPU-Logik
  // ════════════════════════════════════════════════════════════════════════

  function emptyIndices(bd) {
    const res = [];
    for (let i = 0; i < 9; i++) if (bd[i] === '') res.push(i);
    return res;
  }

  function randomChoice(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  // Versuche Sieg oder Blockade für eine Marke
  function tryWinOrBlock(bd, mark) {
    for (const [a, b, c] of WIN_LINES) {
      const line = [bd[a], bd[b], bd[c]];
      const cntMark  = line.filter(v => v === mark).length;
      const cntEmpty = line.filter(v => v === '').length;
      if (cntMark === 2 && cntEmpty === 1) {
        return [a, b, c][[bd[a], bd[b], bd[c]].indexOf('')];
      }
    }
    return null;
  }

  // Minimax (O maximiert)
  function minimax(bd, isMax) {
    const res = checkWinner(bd);
    if (res) {
      if (res.winner === 'O') return  1;
      if (res.winner === 'X') return -1;
      return 0;
    }
    const emp = emptyIndices(bd);
    let best = isMax ? -Infinity : Infinity;
    for (const idx of emp) {
      const copy = bd.slice();
      copy[idx] = isMax ? 'O' : 'X';
      const score = minimax(copy, !isMax);
      best = isMax ? Math.max(best, score) : Math.min(best, score);
    }
    return best;
  }

  function bestMinimax(bd) {
    const emp = emptyIndices(bd);
    let best = -Infinity, bestIdx = emp[0];
    for (const idx of emp) {
      const copy = bd.slice();
      copy[idx] = 'O';
      const score = minimax(copy, false);
      if (score > best) { best = score; bestIdx = idx; }
    }
    return bestIdx;
  }

  function cpuMove() {
    if (checkWinner(board) || emptyIndices(board).length === 0) { locked = false; return; }

    const emp = emptyIndices(board);
    let idx;

    if (difficulty === 'easy') {
      // 80% zufällig, 20% leichte Blockade
      if (Math.random() < 0.2) {
        idx = tryWinOrBlock(board, 'O') ?? tryWinOrBlock(board, 'X') ?? randomChoice(emp);
      } else {
        // Ecken/Kanten bevorzugt, aber zufällig
        const pref = [4, 0, 2, 6, 8, 1, 3, 5, 7];
        const prefFiltered = pref.filter(i => emp.includes(i));
        idx = randomChoice(prefFiltered.slice(0, Math.max(1, Math.ceil(prefFiltered.length * 0.6))));
      }
    } else if (difficulty === 'medium') {
      // 1) Gewinnen 2) Blockieren 3) Minimax mit Fehler
      idx = tryWinOrBlock(board, 'O')
         ?? tryWinOrBlock(board, 'X')
         ?? (Math.random() < 0.45 ? randomChoice(emp) : bestMinimax(board));
    } else {
      // Perfekt: immer Minimax
      // Kleine Zufallschance damit es nicht todlangweilig wird (5%)
      if (Math.random() < 0.05 && emp.length > 6) {
        idx = randomChoice(emp);
      } else {
        idx = tryWinOrBlock(board, 'O')
           ?? tryWinOrBlock(board, 'X')
           ?? bestMinimax(board);
      }
    }

    locked = false;
    makeMove(idx);
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  updateTurnText();
  drawBoard(null);
})();
</script>
</body>
</html>
