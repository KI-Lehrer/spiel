<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tic-Tac-Toe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#12151f;
  --panel:#1b2030;
  --panel-2:#242a3d;
  --paper:#ffffff;
  --line:#12151f;
  --x:#3b5bff;
  --x-dim:#2944c2;
  --o:#ff6a3d;
  --o-dim:#d1502a;
  --win:#ffce3a;
  --muted:#717893;
  --good:#27c281;
  --radius:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  margin:0;padding:0;min-height:100%;
  background:
    radial-gradient(1200px 600px at 50% -10%, #1e2438 0%, var(--ink) 60%);
  color:var(--paper);
  font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
}

.wrap{
  max-width:560px;
  margin:0 auto;
  padding:22px 16px 32px;
  display:flex;flex-direction:column;gap:16px;
}

/* ---------- Header ---------- */
.title{
  display:flex;align-items:center;justify-content:center;gap:14px;
  margin:4px 0 0;
}
.title .mark{
  font-family:'Fredoka',sans-serif;
  font-weight:700;
  font-size:34px;
  line-height:1;
  width:44px;height:44px;
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
}
.title .mark.x{ color:var(--x); border:3px solid var(--x); }
.title .mark.o{ color:var(--o); border:3px solid var(--o); }
.title h1{
  font-family:'Fredoka',sans-serif;
  font-weight:700;
  font-size:30px;
  letter-spacing:.5px;
  margin:0;
  text-align:center;
}
.subtitle{
  text-align:center;
  color:var(--muted);
  font-size:13px;
  font-weight:500;
  margin-top:-6px;
}

/* ---------- Control chips ---------- */
.controls{ display:flex;flex-direction:column;gap:10px; }
.controlRow{ display:flex;gap:8px;align-items:center;flex-wrap:wrap; }
.controlLabel{
  font-size:11px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--muted);
  width:100%;
}
.group{ display:flex;gap:8px;flex-wrap:wrap; }
.chip{
  border:2px solid var(--panel-2);
  background:var(--panel);
  color:var(--paper);
  padding:10px 16px;
  border-radius:999px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  user-select:none;
  transition:background .12s ease, border-color .12s ease, transform .08s ease;
}
.chip:active{ transform:scale(0.96); }
.chip.active{
  background:var(--paper);
  color:var(--ink);
  border-color:var(--paper);
}

/* ---------- Scoreboard ---------- */
.scoreboard{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:2px;
  background:var(--panel-2);
  border-radius:var(--radius);
  overflow:hidden;
  border:2px solid var(--panel-2);
}
.score-cell{
  background:var(--panel);
  padding:14px 8px 12px;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.score-cell .label{
  font-size:11px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);
}
.score-cell .num{
  font-family:'Fredoka',sans-serif;
  font-size:34px;font-weight:700;line-height:1;
  font-variant-numeric:tabular-nums;
}
.score-cell.xs .num{ color:var(--x); }
.score-cell.os .num{ color:var(--o); }
.score-cell.ds .num{ color:var(--paper); }

/* ---------- Turn banner ---------- */
.turnbar{
  border-radius:999px;
  padding:11px 18px;
  text-align:center;
  font-weight:700;
  font-size:15px;
  background:var(--panel);
  border:2px solid var(--panel-2);
  transition:background .2s ease, border-color .2s ease, color .2s ease;
}
.turnbar.turn-x{ border-color:var(--x); color:var(--x); }
.turnbar.turn-o{ border-color:var(--o); color:var(--o); }
.turnbar.turn-done{ border-color:var(--win); color:var(--win); }

/* ---------- Board ---------- */
.board-card{
  background:var(--paper);
  border-radius:24px;
  padding:14px;
  box-shadow:0 18px 40px -16px rgba(0,0,0,.55);
}
.board{
  position:relative;
  width:100%;
  aspect-ratio:1/1;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  gap:8px;
  touch-action:manipulation;
}
.cell{
  position:relative;
  border-radius:14px;
  background:#f1f2f6;
  border:3px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka',sans-serif;
  font-size:clamp(40px,12vw,72px);
  font-weight:700;
  user-select:none;cursor:pointer;
  color:var(--line);
  transition:background .12s ease, transform .08s ease, border-color .12s ease;
}
.cell:active{ transform:scale(0.96); background:#e4e6ee; }
.cell.disabled{ cursor:default; }
.cell.markX{ color:var(--x); }
.cell.markO{ color:var(--o); }
.cell.win{
  background:var(--win);
  border-color:var(--win);
  color:var(--ink) !important;
}

/* ---------- Result line ---------- */
.result{
  min-height:22px;
  text-align:center;
  font-weight:700;
  font-size:15px;
  color:var(--good);
}

/* ---------- Action buttons ---------- */
.actions{ display:flex;gap:10px; }
.btn{
  flex:1;
  border:none;
  border-radius:14px;
  padding:14px 12px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  transition:transform .08s ease, opacity .12s ease;
}
.btn:active{ transform:scale(0.97); }
.btn.primary{ background:var(--paper); color:var(--ink); }
.btn.ghost{ background:transparent; color:var(--paper); border:2px solid var(--panel-2); }

.footer{
  margin-top:4px;
  color:var(--muted);
  font-size:11.5px;
  text-align:center;
  letter-spacing:.02em;
}

@media (max-width:380px){
  .title h1{ font-size:24px; }
  .title .mark{ width:36px;height:36px;font-size:26px; }
}
</style>
</head>
<body>
<div class="wrap">

  <div class="title">
    <div class="mark x">✕</div>
    <h1>TIC&nbsp;TAC&nbsp;TOE</h1>
    <div class="mark o">○</div>
  </div>
  <div class="subtitle">Tippen zum Setzen · für iPad gemacht</div>

  <div class="controls">
    <div class="controlRow">
      <div class="controlLabel">Spielmodus</div>
      <div class="group" role="group" aria-label="Spielmodus">
        <div id="modePVP" class="chip active" tabindex="0" role="button" aria-pressed="true">2 Spieler</div>
        <div id="modeCPU" class="chip" tabindex="0" role="button" aria-pressed="false">Gegen Computer</div>
      </div>
    </div>
    <div class="controlRow">
      <div class="controlLabel">Schwierigkeit</div>
      <div class="group" role="group" aria-label="Schwierigkeit">
        <div id="diffEasy" class="chip active" tabindex="0" role="button" aria-pressed="true">Einfach</div>
        <div id="diffMedium" class="chip" tabindex="0" role="button" aria-pressed="false">Mittel</div>
        <div id="diffHard" class="chip" tabindex="0" role="button" aria-pressed="false">Schwierig</div>
      </div>
    </div>
  </div>

  <div class="scoreboard" aria-live="polite">
    <div class="score-cell xs">
      <div class="label">X</div>
      <div class="num" id="scoreXNum">0</div>
    </div>
    <div class="score-cell ds">
      <div class="label">Unentsch.</div>
      <div class="num" id="scoreDNum">0</div>
    </div>
    <div class="score-cell os">
      <div class="label">O</div>
      <div class="num" id="scoreONum">0</div>
    </div>
  </div>
  <!-- hidden text mirrors kept for compatibility with game logic -->
  <span id="scoreX" hidden>X: 0</span>
  <span id="scoreO" hidden>O: 0</span>
  <span id="scoreD" hidden>Unentschieden: 0</span>

  <div id="turnInfo" class="turnbar turn-x">Am Zug: X</div>

  <div class="board-card">
    <div id="board" class="board" role="grid" aria-label="Tic-Tac-Toe Brett">
      <div class="cell" role="gridcell" data-idx="0" aria-label="Feld 1"></div>
      <div class="cell" role="gridcell" data-idx="1" aria-label="Feld 2"></div>
      <div class="cell" role="gridcell" data-idx="2" aria-label="Feld 3"></div>
      <div class="cell" role="gridcell" data-idx="3" aria-label="Feld 4"></div>
      <div class="cell" role="gridcell" data-idx="4" aria-label="Feld 5"></div>
      <div class="cell" role="gridcell" data-idx="5" aria-label="Feld 6"></div>
      <div class="cell" role="gridcell" data-idx="6" aria-label="Feld 7"></div>
      <div class="cell" role="gridcell" data-idx="7" aria-label="Feld 8"></div>
      <div class="cell" role="gridcell" data-idx="8" aria-label="Feld 9"></div>
    </div>
  </div>

  <div class="result" id="result" aria-live="polite"></div>

  <div class="actions">
    <button id="btnResetRound" class="btn ghost" title="Nur diese Runde neu starten">Neue Runde</button>
    <button id="btnResetAll" class="btn primary" title="Alle Punkte zurücksetzen">Punkte zurücksetzen</button>
  </div>

  <div class="footer">Spielstand wird automatisch gespeichert</div>
</div>

<script>
(function(){
const boardEl = document.getElementById('board');
const cells = Array.from(boardEl.querySelectorAll('.cell'));
const turnInfo = document.getElementById('turnInfo');
const resultEl = document.getElementById('result');
const scoreXEl = document.getElementById('scoreX');
const scoreOEl = document.getElementById('scoreO');
const scoreDEl = document.getElementById('scoreD');
const scoreXNum = document.getElementById('scoreXNum');
const scoreONum = document.getElementById('scoreONum');
const scoreDNum = document.getElementById('scoreDNum');

const modePVP = document.getElementById('modePVP');
const modeCPU = document.getElementById('modeCPU');

const diffEasy = document.getElementById('diffEasy');
const diffMedium = document.getElementById('diffMedium');
const diffHard = document.getElementById('diffHard');

const btnResetRound = document.getElementById('btnResetRound');
const btnResetAll = document.getElementById('btnResetAll');

const wins = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

const STORAGE_KEY = 'tictactoe-sw-state-v1';

let board = Array(9).fill('');
let current = 'X';
let locked = false;
let mode = 'PVP';
let difficulty = 'easy';
let scores = { X:0, O:0, D:0 };

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ scores, mode, difficulty }));
  }catch(e){}
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);
    if(data && data.scores) scores = data.scores;
    if(data && data.mode) mode = data.mode;
    if(data && data.difficulty) difficulty = data.difficulty;
  }catch(e){}
}

function addTapListener(el, handler){
  let touched = false;
  el.addEventListener('touchstart', ()=>{ touched = true; }, {passive:true});
  el.addEventListener('touchend', (e)=>{ e.preventDefault(); handler(e); touched=false; }, {passive:false});
  el.addEventListener('click', (e)=>{ if(!touched) handler(e); });
  el.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); handler(e); }
  });
}

function updateTurnText(){
  if(locked) return;
  turnInfo.classList.remove('turn-x','turn-o','turn-done');
  if(mode==='CPU'){
    if(current==='X'){
      turnInfo.textContent = 'Am Zug: X (Du)';
      turnInfo.classList.add('turn-x');
    }else{
      let label = 'O (Computer – ';
      label += difficulty==='easy' ? 'einfach' : difficulty==='medium' ? 'mittel' : 'schwierig';
      label += ')';
      turnInfo.textContent = 'Am Zug: ' + label;
      turnInfo.classList.add('turn-o');
    }
  }else{
    turnInfo.textContent = 'Am Zug: ' + current;
    turnInfo.classList.add(current==='X' ? 'turn-x' : 'turn-o');
  }
}

function drawBoard(){
  cells.forEach((c, i)=>{
    c.textContent = board[i];
    c.classList.toggle('disabled', board[i]!=='' || locked);
    c.classList.toggle('markX', board[i]==='X');
    c.classList.toggle('markO', board[i]==='O');
    c.classList.remove('win');
  });
}

function setResult(msg){ resultEl.textContent = msg || ''; }

function checkWinner(bd){
  for(const [a,b,c] of wins){
    if(bd[a] && bd[a]===bd[b] && bd[a]===bd[c]) return bd[a];
  }
  if(bd.every(v => v!=='')) return 'D';
  return null;
}

function getWinningCombo(bd, winner){
  for(const combo of wins){
    const [a,b,c] = combo;
    if(bd[a]===winner && bd[b]===winner && bd[c]===winner) return combo;
  }
  return null;
}

function endRound(winner){
  locked = true;
  if(winner==='X' || winner==='O'){
    setResult('Gewonnen: ' + winner);
    scores[winner] += 1;
    const combo = getWinningCombo(board, winner);
    if(combo){ combo.forEach(i => cells[i].classList.add('win')); }
  }else{
    setResult('Unentschieden');
    scores.D += 1;
  }
  updateScores();
  turnInfo.classList.remove('turn-x','turn-o');
  turnInfo.classList.add('turn-done');
  turnInfo.textContent = 'Runde beendet';
  saveState();
}

function updateScores(){
  scoreXEl.textContent = 'X: ' + scores.X;
  scoreOEl.textContent = 'O: ' + scores.O;
  scoreDEl.textContent = 'Unentschieden: ' + scores.D;
  scoreXNum.textContent = scores.X;
  scoreONum.textContent = scores.O;
  scoreDNum.textContent = scores.D;
}

function restartRound(keepPlayer=true){
  board = Array(9).fill('');
  locked = false;
  setResult('');
  if(!keepPlayer) current = 'X';
  drawBoard();
  updateTurnText();
  if(mode==='CPU' && current==='O'){
    setTimeout(cpuMove, 300);
  }
}

function resetAll(){
  scores = { X:0, O:0, D:0 };
  updateScores();
  current = 'X';
  restartRound(false);
  saveState();
}

function emptyIndices(bd){
  const res = [];
  for(let i=0;i<9;i++) if(bd[i]==='') res.push(i);
  return res;
}

function tryWinOrBlock(bd, mark){
  for(const [a,b,c] of wins){
    const line = [bd[a], bd[b], bd[c]];
    const cntMark = line.filter(v=>v===mark).length;
    const cntEmpty = line.filter(v=>v==='').length;
    if(cntMark===2 && cntEmpty===1){
      if(bd[a]==='') return a;
      if(bd[b]==='') return b;
      if(bd[c]==='') return c;
    }
  }
  return null;
}

function randomChoice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function minimax(bd, player){
  const winner = checkWinner(bd);
  if(winner==='O') return {score: 1};
  if(winner==='X') return {score: -1};
  if(winner==='D') return {score: 0};

  const moves = [];
  const empties = emptyIndices(bd);

  for(const idx of empties){
    const bdCopy = bd.slice();
    bdCopy[idx] = player;
    const next = player==='O' ? 'X' : 'O';
    const res = minimax(bdCopy, next);
    moves.push({ idx, score: res.score });
  }

  if(player==='O'){
    let best = -Infinity, bestMove = moves[0];
    for(const m of moves){ if(m.score > best){ best = m.score; bestMove = m; } }
    return bestMove;
  }else{
    let best = Infinity, bestMove = moves[0];
    for(const m of moves){ if(m.score < best){ best = m.score; bestMove = m; } }
    return bestMove;
  }
}

function cpuMove(){
  if(locked) return;

  const my = 'O';
  const you = 'X';

  let move = null;

  if(difficulty==='easy'){
    const r = Math.random();
    if(r < 0.2){
      move = tryWinOrBlock(board, my);
      if(move===null) move = tryWinOrBlock(board, you);
    }
    if(move===null){
      const empties = emptyIndices(board);
      const pref = [4,0,2,6,8,1,3,5,7].filter(i=>board[i]==='');
      move = pref.length ? randomChoice(pref.slice(0, Math.max(1, Math.floor(pref.length*0.6)))) : randomChoice(empties);
    }
    if(move===null){
      const empties = emptyIndices(board);
      move = randomChoice(empties);
    }
  } else if(difficulty==='medium'){
    move = tryWinOrBlock(board, my);
    if(move===null) move = tryWinOrBlock(board, you);

    const spice = Math.random() < 0.15;

    if(move===null){
      if(board[4]===''){
        move = spice ? null : 4;
      }
    }
    if(move===null){
      const corners = [0,2,6,8].filter(i=>board[i]==='');
      if(corners.length) move = spice ? randomChoice(emptyIndices(board)) : randomChoice(corners);
    }
    if(move===null){
      const edges = [1,3,5,7].filter(i=>board[i]==='');
      if(edges.length) move = randomChoice(edges);
    }
  } else {
    const best = minimax(board.slice(), my);
    move = best && typeof best.idx==='number' ? best.idx : null;
    if(move===null){
      const empties = emptyIndices(board);
      move = randomChoice(empties);
    }
  }

  if(move==null) return;
  if(board[move] !== '') return;

  board[move] = my;

  const w = checkWinner(board);
  drawBoard();
  if(w){ endRound(w); return; }

  current = 'X';
  updateTurnText();
}

function playerMove(idx){
  if(locked) return;
  if(board[idx] !== '') return;
  if(mode==='CPU' && current==='O') return;

  board[idx] = current;
  const w = checkWinner(board);
  drawBoard();
  if(w){ endRound(w); return; }

  current = current==='X' ? 'O' : 'X';
  updateTurnText();

  if(mode==='CPU' && current==='O' && !locked){
    setTimeout(cpuMove, 320);
  }
}

function setMode(newMode){
  mode = newMode;
  modePVP.classList.toggle('active', mode==='PVP');
  modePVP.setAttribute('aria-pressed', mode==='PVP' ? 'true' : 'false');
  modeCPU.classList.toggle('active', mode==='CPU');
  modeCPU.setAttribute('aria-pressed', mode==='CPU' ? 'true' : 'false');
  current = 'X';
  restartRound(false);
  saveState();
}

function setDifficulty(diff){
  difficulty = diff;
  diffEasy.classList.toggle('active', diff==='easy');
  diffEasy.setAttribute('aria-pressed', diff==='easy' ? 'true' : 'false');
  diffMedium.classList.toggle('active', diff==='medium');
  diffMedium.setAttribute('aria-pressed', diff==='medium' ? 'true' : 'false');
  diffHard.classList.toggle('active', diff==='hard');
  diffHard.setAttribute('aria-pressed', diff==='hard' ? 'true' : 'false');

  if(mode==='CPU' && current==='O' && !locked){
    setTimeout(cpuMove, 150);
  }
  saveState();
}

cells.forEach(cell=>{
  const idx = Number(cell.getAttribute('data-idx'));
  addTapListener(cell, ()=> playerMove(idx));
});

addTapListener(modePVP, ()=> setMode('PVP'));
addTapListener(modeCPU, ()=> setMode('CPU'));

addTapListener(diffEasy, ()=> setDifficulty('easy'));
addTapListener(diffMedium, ()=> setDifficulty('medium'));
addTapListener(diffHard, ()=> setDifficulty('hard'));

addTapListener(btnResetRound, ()=> restartRound(true));
addTapListener(btnResetAll, ()=> resetAll());

// Init: restore saved scores/settings, then reflect in UI controls
loadState();
modePVP.classList.toggle('active', mode==='PVP');
modePVP.setAttribute('aria-pressed', mode==='PVP' ? 'true' : 'false');
modeCPU.classList.toggle('active', mode==='CPU');
modeCPU.setAttribute('aria-pressed', mode==='CPU' ? 'true' : 'false');
diffEasy.classList.toggle('active', difficulty==='easy');
diffEasy.setAttribute('aria-pressed', difficulty==='easy' ? 'true' : 'false');
diffMedium.classList.toggle('active', difficulty==='medium');
diffMedium.setAttribute('aria-pressed', difficulty==='medium' ? 'true' : 'false');
diffHard.classList.toggle('active', difficulty==='hard');
diffHard.setAttribute('aria-pressed', difficulty==='hard' ? 'true' : 'false');
updateScores();
drawBoard();
updateTurnText();
})();
</script>
</body>
</html>
