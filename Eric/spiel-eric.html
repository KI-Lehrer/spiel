<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/><title>Münz-Sammler mit Shop – 3 Level</title><style>  *{box-sizing:border-box}  html,body{height:100%}  body{    margin:0; font-family: system-ui, -apple-system, Segoe UI, Arial, sans-serif; color:#e9eefc;    background: radial-gradient(1200px 600px at 50% -200px, #151927 0%, #0c1020 45%, #090b16 100%);    display:flex; flex-direction:column; align-items:center;  }  header{padding:12px 10px; width:100%; max-width:1000px;}  h3{margin:0 0 8px 0; font-size:20px}  #menu{display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end; background:rgba(0,0,0,.28); padding:10px; border-radius:10px; border:1px solid #24283a}  label{display:flex; flex-direction:column; font-size:13px; gap:6px}  select, input[type=color], input[type=range]{padding:8px; border-radius:8px; border:1px solid #2a2e45; background:#101426; color:#e7e9f3; min-width:120px}  input[type=range]{padding:0; height:10px; min-width:100px}  button{    padding:10px 14px; border-radius:10px; border:0; font-weight:700; cursor:pointer;    background:linear-gradient(#27c79a,#0f8769); color:#041c16; letter-spacing:.3px;  }  button.secondary{background:linear-gradient(#3a3d52,#232638); color:#e7e9f3}  button.level{background:linear-gradient(#7aa6ff,#4167d9); color:#061a3d}  button.sound{background:linear-gradient(#d7a7ff,#8d5ad9); color:#2b114e}  button.shop{background:linear-gradient(#ffc76e,#f19a29); color:#3a1e00}  #ui{display:flex; gap:8px; width:100%; max-width:1000px; padding:8px}  .panel{flex:1; text-align:center; background:rgba(0,0,0,.35); border:1px solid #24283a; border-radius:10px; padding:8px 10px; font-size:14px}  .panel strong{color:#7ef0c0}  #gameArea{    position:relative; width:960px; max-width:96vw; aspect-ratio: 16 / 9;    background:#090b14; overflow:hidden; border:4px solid #212635; border-radius:12px; box-shadow:0 12px 44px rgba(0,0,0,.6);    touch-action:none;  }  #dpad{    position:absolute; z-index:90; left:12px; bottom:12px; width:160px; height:160px; display:none;    opacity:0.96; user-select:none;  }  .dpad-grid{position:absolute; inset:0; display:grid; grid-template-columns:1fr 1fr 1fr; grid-template-rows:1fr 1fr 1fr; gap:8px;}  .dpad-btn{    background:linear-gradient(#1a2033,#121627); border:1px solid #303650; border-radius:14px; display:flex; align-items:center; justify-content:center;    color:#dfe6ff; font-weight:900; font-size:20px; box-shadow:0 4px 12px rgba(0,0,0,.35), inset 0 0 0 2px rgba(255,255,255,.05);    touch-action:none;  }  .dpad-btn:active, .dpad-btn.active{ background:linear-gradient(#263056,#1b2240); border-color:#42508a; }  .dpad-center{ opacity:.45 }  .up{grid-column:2; grid-row:1;} .left{grid-column:1; grid-row:2;} .right{grid-column:3; grid-row:2;} .down{grid-column:2; grid-row:3;} .mid{grid-column:2; grid-row:2;}  #message{    position:absolute; left:50%; top:10px; transform:translateX(-50%);    background:rgba(16,20,32,.92); border:1px solid #252a40;    padding:10px 14px; border-radius:10px; font-weight:700; z-index:80; display:none;  }  .theme-base{ position:absolute; inset:0; pointer-events:none; }  /* Level 1 – Nachtwald */  .nightSky{position:absolute; inset:0; background:      radial-gradient(140px 140px at 78% 14%, rgba(240,240,255,.10), transparent 80%),      linear-gradient(#0d1222 0%, #0a0e18 55%, #070a12 100%); z-index:2;}  .moon{position:absolute; width:100px; height:100px; border-radius:50%; right:18px; top:18px;    background: radial-gradient(circle at 50% 50%, #f7f7ff 0%, #eeeef8 40%, #e6e6f2 60%, #dcddec 100%);    border:1px solid #cfd2e6; box-shadow:0 0 30px rgba(230,235,255,.35), 0 0 120px rgba(220,230,255,.25); z-index:10;}  .moonGlow{position:absolute; inset:0; z-index:9; background:      radial-gradient(420px 320px at calc(100% - 40px) 40px, rgba(220,230,255, .20) 0%, rgba(220,230,255, .12) 30%, rgba(220,230,255, 0) 70%); pointer-events:none; mix-blend-mode: screen;}  .forestGround{position:absolute; inset:0; z-index:3; background:      radial-gradient(60% 50% at 50% 80%, rgba(16,24,18,.55), rgba(12,16,14,.95)),      repeating-linear-gradient(12deg, #121a14 0 6px, #121914 6px 12px, #101713 12px 18px);    box-shadow: inset 0 0 240px rgba(0,0,0,.75);}  .softHills{position:absolute; left:-20%; right:-20%; bottom:18%; height:38%; background:      radial-gradient(120% 80% at 10% 100%, #121912 12%, transparent 60%),      radial-gradient(90% 70% at 40% 100%, #101810 12%, transparent 62%),      radial-gradient(110% 90% at 70% 100%, #0f170f 12%, transparent 64%); z-index:4; opacity:.95;}  .mist{position:absolute; inset:0; z-index:20; background:      radial-gradient(60% 30% at 30% 20%, rgba(200,220,220,.16), transparent),      radial-gradient(60% 30% at 70% 30%, rgba(200,220,220,.14), transparent),      radial-gradient(70% 35% at 60% 70%, rgba(200,220,220,.12), transparent);    filter: blur(3px); opacity:.96;}  /* Level 2 – Offene Fläche */  .openSky{position:absolute; inset:0; background:      radial-gradient(220px 140px at 15% 12%, rgba(200,230,255,.12), transparent 80%),      linear-gradient(#0f1830 0%, #0b1226 60%, #08101f 100%); z-index:2;}  .openGlow{position:absolute; inset:0; z-index:9; background:      radial-gradient(520px 380px at 40px 40px, rgba(220,235,255,.18), rgba(0,0,0,0) 70%); pointer-events:none; mix-blend-mode:screen;}  .openFloor{position:absolute; inset:0; z-index:3; background:      radial-gradient(60% 50% at 50% 80%, rgba(24,26,34,.55), rgba(16,18,24,.95)),      repeating-linear-gradient(0deg, #0f1426 0 8px, #0e1322 8px 16px);    box-shadow: inset 0 0 240px rgba(0,0,0,.75);}  /* Level 3 – Heller Morgen */  .morningSky{position:absolute; inset:0; background:      radial-gradient(260px 160px at 20% 10%, rgba(255,255,255,.25), transparent 70%),      linear-gradient(#b9e3ff 0%, #9bd3ff 40%, #7fc9ff 70%, #66b8ff 100%); z-index:2;}  .sun{position:absolute; width:90px; height:90px; border-radius:50%; left:18px; top:18px;    background: radial-gradient(circle at 50% 50%, #fff9c4 0%, #ffe082 60%, #ffca28 100%);    border:1px solid #ffd54f; box-shadow:0 0 50px rgba(255,220,120,.6), 0 0 120px rgba(255,220,120,.4); z-index:10;}  .morningGlow{position:absolute; inset:0; z-index:9; background:      radial-gradient(520px 380px at 40px 40px, rgba(255,255,255,.35), rgba(0,0,0,0) 70%); pointer-events:none; mix-blend-mode:screen;}  .morningFloor{position:absolute; inset:0; z-index:3; background:      radial-gradient(60% 50% at 50% 80%, rgba(205,240,205,.6), rgba(170,225,170,.95)),      repeating-linear-gradient(0deg, #bde0bd 0 8px, #a8d8a8 8px 16px);    box-shadow: inset 0 0 200px rgba(0,0,0,.35);}  /* Bäume */  .tree{ position:absolute; width:1px; height:1px; z-index:7; pointer-events:none; opacity:.98;    --barkDark:#2b1f16; --barkMid:#3a2a1d; --barkLite:#584231; --shade: rgba(0,0,0,.35);  }  .tree .trunk{    position:absolute; bottom:0; left:50%;    width: 18px; height: 160px; transform-origin: bottom center; transform: translateX(-50%) rotate(var(--lean,0deg));    background: linear-gradient(90deg, var(--barkDark) 0 10%, var(--barkMid) 45%, var(--barkLite) 70%, var(--barkDark) 100%);    border-radius: 12px 12px 8px 8px;    box-shadow: inset -3px 0 6px var(--shade), inset 0 0 8px rgba(0,0,0,.25), 0 8px 14px rgba(0,0,0,.25);  }  .tree .trunk:before{    content:""; position:absolute; left:3px; right:3px; top:20px; bottom:10px; border-radius:10px;    background: repeating-linear-gradient( to bottom, rgba(0,0,0,.10) 0 6px, transparent 6px 12px );    opacity:.4; mix-blend-mode:multiply;  }  .knob{ position:absolute; width:6px; height:6px; border-radius:50%; background:#3b2b1f; box-shadow: inset 0 0 0 1px rgba(0,0,0,.25); }  /* Spieler + Accessoires */  #player{ position:absolute; width:40px; height:72px; left:50%; transform:translateX(-50%); bottom:15%; z-index:60; display:flex; align-items:center; justify-content:center; }  .human{ position:absolute; inset:0; }  .human .head{ position:absolute; width:28px; height:28px; background: var(--skin,#f2d7b5); border-radius:50%; left:50%; top:-2px; transform:translateX(-50%); box-shadow: inset 0 0 0 2px rgba(0,0,0,.10); }  .human .eye{ position:absolute; width:5px; height:6px; background:#222; border-radius:50%; top:8px; }  .human .eye.left{ left:8px; } .human .eye.right{ right:8px; }  .human .nose{ position:absolute; width:4px; height:6px; left:50%; top:12px; transform:translateX(-50%); background:#c89f7b; border-radius:2px; }  .human .mouth{ position:absolute; width:12px; height:6px; left:50%; top:18px; transform:translateX(-50%); border-radius:0 0 8px 8px; background:#a35f5f; }  .human .hairBase{ position:absolute; left:50%; transform:translateX(-50%); top:-2px; width:30px; height:10px; border-radius:6px; background: var(--hair,#2b1f1f); }  .human .torso{ position:absolute; left:8px; right:8px; top:22px; height:18px; background: var(--shirt,#1e6bff); border-radius:10px 10px 4px 4px; box-shadow: inset 0 0 0 2px rgba(0,0,0,.10); }  .human .sleeve{ position:absolute; width:10px; height:10px; top:26px; background: var(--shirt,#1e6bff); border-radius:6px; }  .human .sleeve.left{ left:-2px; } .human .sleeve.right{ right:-2px; }  .human .pants{ position:absolute; left:10px; right:10px; top:38px; bottom:12px; background: var(--pants,#2b3c6e); border-radius:6px 6px 8px 8px; box-shadow: inset 0 0 0 2px rgba(0,0,0,.10); }  .human .pantLeg{ position:absolute; width:12px; height:20px; bottom:6px; background: var(--pants,#2b3c6e); border-radius:4px; }  .human .pantLeg.left{ left:8px; } .human .pantLeg.right{ right:8px; }  .human .arm{ position:absolute; width:10px; height:16px; background: var(--skin,#f2d7b5); top:34px; border-radius:8px; box-shadow: inset 0 0 0 2px rgba(0,0,0,.08); }  .human .arm.left{ left:-2px; transform:rotate(6deg); }  .human .arm.right{ right:-2px; transform:rotate(-6deg); }  .human .leg{ position:absolute; width:10px; height:8px; background: var(--skin,#f2d7b5); bottom:0px; border-radius:6px; box-shadow: inset 0 0 0 2px rgba(0,0,0,.08); }  .human .leg.left{ left:8px; } .human .leg.right{ right:8px; }  .human .shoe{ position:absolute; width:14px; height:8px; bottom:-4px; background: var(--shoe,#0d2a6b); border-radius:8px 8px 10px 10px; box-shadow: inset 0 0 0 2px rgba(0,0,0,.10); }  .human .shoe.left{ left:6px; } .human .shoe.right{ right:6px; }  .human .sole{ position:absolute; width:16px; height:3px; bottom:-6px; background:#cfd6e6; border-radius:2px; filter: brightness(0.9); }  .human .sole.left{ left:5px; } .human .sole.right{ right:5px; }  /* Accessoires */  .acc-hat{ position:absolute; left:50%; transform:translateX(-50%); top:-8px; width:34px; height:10px; background:#33214a; border-radius:6px; display:none; }  .acc-hat:after{ content:""; position:absolute; left:-4px; right:-4px; bottom:-4px; height:6px; background:#2a183e; border-radius:6px; }  .acc-scarf{ position:absolute; left:50%; transform:translateX(-50%); top:20px; width:26px; height:6px; background:#b02b2b; border-radius:4px; display:none; }  .acc-scarf:after{ content:""; position:absolute; left:18px; top:4px; width:6px; height:12px; background:#9a2424; border-radius:3px; }  .acc-pack{ position:absolute; left:4px; top:30px; width:10px; height:14px; background:#3b4a52; border-radius:3px; display:none; box-shadow: inset 0 0 0 2px rgba(0,0,0,.1); }  .acc-glasses{ position:absolute; left:50%; transform:translateX(-50%); top:6px; width:24px; height:8px; display:none; }  .acc-glasses:before, .acc-glasses:after{ content:""; position:absolute; width:8px; height:6px; border:2px solid #111; border-radius:2px; top:0; }  .acc-glasses:before{ left:0; } .acc-glasses:after{ right:0; }  .acc-glasses i{ position:absolute; left:50%; top:2px; width:6px; height:2px; background:#111; transform:translateX(-50%); }  /* Dunkelheits-Effekt */  #darkness{ position:absolute; inset:0; pointer-events:none; z-index:50; }  /* Gegner: freundliche „Geisterblasen“ */  .enemy { position:absolute; z-index:56; width:36px; height:36px; }  .ghost{    position:absolute; inset:0;    background: radial-gradient(circle at 40% 35%, rgba(255,255,255,0.95), rgba(210,240,255,0.9) 60%, rgba(140,200,255,0.7) 100%);    border:1px solid rgba(220,240,255,0.9);    border-radius:18px 18px 12px 12px;    box-shadow:0 0 18px rgba(150,210,255,0.7);  }  .ghost:after{    content:""; position:absolute; left:4px; right:4px; bottom:-6px; height:12px;    background:      radial-gradient(10px 6px at 10% 0%, rgba(220,240,255,0.85) 40%, transparent 60%),      radial-gradient(10px 6px at 40% 0%, rgba(220,240,255,0.85) 40%, transparent 60%),      radial-gradient(10px 6px at 70% 0%, rgba(220,240,255,0.85) 40%, transparent 60%);    filter: blur(0.2px);  }  .eye-dot{ position:absolute; width:4px; height:6px; background:#1c2a33; border-radius:50%; top:10px; }  .eye-dot.left{ left:10px; } .eye-dot.right{ right:10px; }  .halo{    position:absolute; inset:-6px; border-radius:22px;    box-shadow:0 0 24px rgba(120,190,255,0.55), inset 0 0 10px rgba(255,255,255,0.35);    pointer-events:none;  }  /* Münzen */  .coin{ position:absolute; width:20px; height:20px; border-radius:50%;    background: radial-gradient(circle at 30% 30%, #fff3b0, #ffd24d 60%, #f2a700 100%);    border:1px solid #f5c14a; box-shadow:0 0 10px rgba(255,210,80,0.5);    z-index:40;  }  .coin:after{ content:""; position:absolute; inset:3px; border-radius:50%; border:2px solid rgba(180,120,10,0.6); }  /* Shop */  #shopPanel{ position:relative; width:100%; max-width:1000px; margin:8px 0 0 0;    background:rgba(0,0,0,.35); border:1px solid #24283a; border-radius:10px; padding:10px; display:none; }  #shopGrid{ display:grid; grid-template-columns: repeat(2, minmax(220px, 1fr)); gap:10px; }  .shopItem{ background:rgba(10,14,26,.6); border:1px solid #2b3048; border-radius:10px; padding:8px; display:flex; gap:10px; align-items:center; justify-content:space-between;}  .shopItem .info{font-size:14px}  .shopItem .price{font-weight:700; color:#ffd24d}  .shopItem button{ min-width:110px; }  .owned{ opacity:0.75 }</style></head><body><header>  <h3>Münz-Sammler mit Shop – 3 Level</h3>  <div id="menu">    <label>Level      <select id="levelSelect">        <option value="1">Level 1 – Nachtwald</option>        <option value="2">Level 2 – Offene Fläche</option>        <option value="3">Level 3 – Heller Morgen</option>      </select>    </label>    <label>Haut      <input id="skin" type="color" value="#f2d7b5"/>    </label>    <label>Haar      <input id="hair" type="color" value="#2b1f1f"/>    </label>    <label>T‑Shirt      <input id="shirtColor" type="color" value="#1e6bff"/>    </label>    <label>Hosen      <input id="pantsColor" type="color" value="#2b3c6e"/>    </label>    <label>Schuhe      <input id="shoeColor" type="color" value="#0d2a6b"/>    </label>    <button id="startBtn" class="level">Level starten</button>    <button id="nextBtn" class="level" style="display:none;">Nächstes Level</button>    <button id="resetBtn" class="secondary">Zurücksetzen</button>    <button id="soundBtn" class="sound">Sound: AN</button>    <label>Lautstärke      <input id="volume" type="range" min="0" max="1" step="0.01" value="0.2"/>    </label>    <button id="toggleShop" class="shop">Shop öffnen</button>  </div></header><div id="ui">  <div class="panel">Level: <strong id="levelText">Nachtwald</strong></div>  <div class="panel">Leben: <strong id="lives">3</strong></div>  <div class="panel">Zeit: <strong id="timer">01:00</strong></div>  <div class="panel">Münzen: <strong id="coins">0</strong></div></div><div id="shopPanel"><div id="shopGrid"></div></div><div id="gameArea" aria-label="Spielbereich">  <div id="dpad" aria-hidden="false">    <div class="dpad-grid">      <div class="dpad-btn up">▲</div>      <div class="dpad-btn mid dpad-center">●</div>      <div class="dpad-btn left">◀</div>      <div class="dpad-btn right">▶</div>      <div class="dpad-btn down">▼</div>    </div>  </div>  <!-- Level 1 -->  <div id="nightSky" class="theme-base nightSky"></div>  <div id="nightMoon" class="moon"></div>  <div id="nightGlow" class="moonGlow"></div>  <div id="forestGround" class="theme-base forestGround"></div>  <div id="forestHills" class="theme-base softHills"></div>  <div id="forestMist" class="theme-base mist"></div>  <!-- Level 2 -->  <div id="openSky" class="theme-base openSky" style="display:none;"></div>  <div id="openGlow" class="theme-base openGlow" style="display:none;"></div>  <div id="openFloor" class="theme-base openFloor" style="display:none;"></div>  <!-- Level 3 -->  <div id="morningSky" class="theme-base morningSky" style="display:none;"></div>  <div id="sun" class="sun" style="display:none;"></div>  <div id="morningGlow" class="theme-base morningGlow" style="display:none;"></div>  <div id="morningFloor" class="theme-base morningFloor" style="display:none;"></div>  <!-- Bäume-Schichten (nur Level 1) -->  <div id="treeLayerBack" class="theme-base"></div>  <div id="treeLayerFront" class="theme-base"></div>  <div id="darkness"></div>  <div id="message" role="status" aria-live="polite"></div>  <!-- Spieler -->  <div id="player" aria-hidden="true">    <div class="human">      <div class="head">        <div class="eye left"></div>        <div class="eye right"></div>        <div class="nose"></div>        <div class="mouth"></div>      </div>      <div class="hairBase"></div>      <div class="torso"></div>      <div class="sleeve left"></div>      <div class="sleeve right"></div>      <div class="pants"></div>      <div class="pantLeg left"></div>      <div class="pantLeg right"></div>      <div class="arm left"></div>      <div class="arm right"></div>      <div class="leg left"></div>      <div class="leg right"></div>      <div class="shoe left"></div>      <div class="shoe right"></div>      <div class="sole left"></div>      <div class="sole right"></div>      <div class="acc-hat"   id="accHat"></div>      <div class="acc-scarf" id="accScarf"></div>      <div class="acc-pack"  id="accPack"></div>      <div class="acc-glasses" id="accGlasses"><i></i></div>    </div>  </div></div><footer>Steuerung: Pfeiltasten oder Touch‑Pfeile. Ziel: Überlebe 60 Sekunden pro Level. Sammle Münzen und kaufe im Shop! Sound startet automatisch.</footer><script>const ONE_MIN_MS = 60000;/* Referenzen */const gameArea = document.getElementById('gameArea');const darkness = document.getElementById('darkness');const playerEl = document.getElementById('player');const humanEl = playerEl.querySelector('.human');const startBtn = document.getElementById('startBtn');const nextBtn = document.getElementById('nextBtn');const resetBtn = document.getElementById('resetBtn');const levelText = document.getElementById('levelText');const livesEl = document.getElementById('lives');const timerEl = document.getElementById('timer');const coinsEl = document.getElementById('coins');const message = document.getElementById('message');const dpad = document.getElementById('dpad');const levelSelect = document.getElementById('levelSelect');const soundBtn = document.getElementById('soundBtn');const volumeSlider = document.getElementById('volume');const toggleShopBtn = document.getElementById('toggleShop');const shopPanel = document.getElementById('shopPanel');const shopGrid = document.getElementById('shopGrid');/* Level-Dekor */const nightSky   = document.getElementById('nightSky');const nightMoon  = document.getElementById('nightMoon');const nightGlow  = document.getElementById('nightGlow');const forestGround = document.getElementById('forestGround');const forestHills  = document.getElementById('forestHills');const forestMist   = document.getElementById('forestMist');const treeLayerBack = document.getElementById('treeLayerBack');const treeLayerFront = document.getElementById('treeLayerFront');const openSky = document.getElementById('openSky');const openGlow = document.getElementById('openGlow');const openFloor = document.getElementById('openFloor');const morningSky = document.getElementById('morningSky');const sun = document.getElementById('sun');const morningGlow = document.getElementById('morningGlow');const morningFloor = document.getElementById('morningFloor');/* Farben/Kleidung */const hairColorInput = document.getElementById('hair');const skinColorInput = document.getElementById('skin');const shirtColorInput = document.getElementById('shirtColor');const pantsColorInput = document.getElementById('pantsColor');const shoeColorInput = document.getElementById('shoeColor');/* Accessoires */const accHat = document.getElementById('accHat');const accScarf = document.getElementById('accScarf');const accPack = document.getElementById('accPack');const accGlasses = document.getElementById('accGlasses');/* State */let state = {  running:false,  lives:3,  playerPos:{x:480,y:360},  keys:{},  enemies:[],  coins:0,  levelCoins:0,  coinsOnField:[],  tick:0,  levelEndAt:0,  lastTs:0,  invulnerableUntil:0,  currentLevel: 1, // 1..3  soundOn: true,  owned: { hat:false, scarf:false, pack:false, glasses:false },  prices: { tshirt:10, pants:10, shoes:10, hat:15, scarf:12, pack:14, glasses:12 }};/* UI */function showMessage(text, ms=1800){  message.textContent = text;  message.style.display = 'block';  clearTimeout(message._t);  if(ms>0){ message._t = setTimeout(()=> message.style.display='none', ms); }}function hideMessage(){ message.style.display = 'none'; }function formatTimeLeft(ms){  const s = Math.max(0, Math.floor(ms/1000));  const m = Math.floor(s/60).toString().padStart(2,'0');  const r = (s%60).toString().padStart(2,'0');  return m+':'+r;}function updateCoinsUI(){ coinsEl.textContent = state.coins; }/* Style anwenden */function applyPlayerStyle(){  humanEl.style.setProperty('--skin', skinColorInput.value);  humanEl.style.setProperty('--hair', hairColorInput.value);  humanEl.style.setProperty('--shirt', shirtColorInput.value);  humanEl.style.setProperty('--pants', pantsColorInput.value);  humanEl.style.setProperty('--shoe', shoeColorInput.value);}function applyAccessories(){  accHat.style.display = state.owned.hat ? 'block':'none';  accScarf.style.display = state.owned.scarf ? 'block':'none';  accPack.style.display = state.owned.pack ? 'block':'none';  accGlasses.style.display = state.owned.glasses ? 'block':'none';}/* Positionen */function resetBoardPositions(){  state.playerPos = { x: gameArea.clientWidth/2, y: gameArea.clientHeight*0.72 };  updatePlayerElement();  updateDarknessSpot();}function updatePlayerElement(){  playerEl.style.left = (state.playerPos.x - 20) + 'px';  playerEl.style.top  = (state.playerPos.y - 72) + 'px';}function updateDarknessSpot(){  const px = state.playerPos.x;  const py = state.playerPos.y - 30;  darkness.style.background = 'radial-gradient(circle at '+px+'px '+py+'px, rgba(0,0,0,0) 0px, rgba(0,0,0,0.10) 120px, rgba(0,0,0,0.24) 180px, rgba(0,0,0,0.55) 280px, rgba(0,0,0,0.88) 100%)';}/* Steuerung */window.addEventListener('keydown', e=>{  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)){    e.preventDefault(); state.keys[e.key]=true;  }});window.addEventListener('keyup', e=>{ state.keys[e.key]=false; });function setDpadVisible(flag){ dpad.style.display = flag ? 'block' : 'none'; }function bindDpad(){  const up = dpad.querySelector('.up');  const down = dpad.querySelector('.down');  const left = dpad.querySelector('.left');  const right = dpad.querySelector('.right');  const press = (key, el)=>{ state.keys[key]=true; el.classList.add('active'); };  const release = (key, el)=>{ state.keys[key]=false; el.classList.remove('active'); };  const map = [    {el:up, key:'ArrowUp'},    {el:down, key:'ArrowDown'},    {el:left, key:'ArrowLeft'},    {el:right, key:'ArrowRight'}  ];  map.forEach(({el,key})=>{    el.addEventListener('touchstart', e=>{ e.preventDefault(); press(key, el); }, {passive:false});    el.addEventListener('touchend',   e=>{ e.preventDefault(); release(key, el); }, {passive:false});    el.addEventListener('touchcancel',e=>{ e.preventDefault(); release(key, el); }, {passive:false});    el.addEventListener('touchmove',  e=>{ e.preventDefault(); }, {passive:false});    el.addEventListener('mousedown', e=>{ e.preventDefault(); press(key, el); });    window.addEventListener('mouseup', ()=>{ release(key, el); });    el.addEventListener('mouseleave', ()=>{ release(key, el); });  });}/* Helfer */function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }function rnd(min,max){ return min + Math.random()*(max-min); }/* Bewegung Spieler */function updatePlayer(dt){  let speed = 210;  let nx = state.playerPos.x;  let ny = state.playerPos.y;  if(state.keys.ArrowLeft)  nx -= speed*dt;  if(state.keys.ArrowRight) nx += speed*dt;  if(state.keys.ArrowUp)    ny -= speed*dt;  if(state.keys.ArrowDown)  ny += speed*dt;  state.playerPos.x = clamp(nx, 20, gameArea.clientWidth-20);  state.playerPos.y = clamp(ny, 60, gameArea.clientHeight-40);  updatePlayerElement();  updateDarknessSpot();}/* Überlappung */function intersects(a,b){  return !(a.right < b.left || a.left > b.right || a.bottom < b.top || a.top > b.bottom);}/* Gegner */function createGhost(){  const root = document.createElement('div');  root.className='enemy ghostWrap';  const g = document.createElement('div'); g.className='ghost';  const e1 = document.createElement('div'); e1.className='eye-dot left';  const e2 = document.createElement('div'); e2.className='eye-dot right';  const halo = document.createElement('div'); halo.className='halo';  g.appendChild(e1); g.appendChild(e2); g.appendChild(halo);  root.appendChild(g);  root.style.width='36px'; root.style.height='36px';  return root;}function spawnEnemy(){  const el = createGhost();  const side = Math.random();  let x,y;  if(side<0.25){ x=-60; y= 90 + Math.random()*(gameArea.clientHeight-190); }  else if(side<0.5){ x=gameArea.clientWidth+60; y= 90 + Math.random()*(gameArea.clientHeight-190); }  else if(side<0.75){ x = 60 + Math.random()*(gameArea.clientWidth-120); y = -60; }  else { x = 60 + Math.random()*(gameArea.clientWidth-120); y = gameArea.clientHeight + 60; }  el.style.left = x+'px'; el.style.top = y+'px';  gameArea.appendChild(el);  state.enemies.push({el, velX:0, velY:0});}function updateEnemies(dt){  const now = performance.now();  const canHit = now > state.invulnerableUntil;  const pRect = playerEl.getBoundingClientRect();  const gaRect = gameArea.getBoundingClientRect();  let minDist = Infinity;  for(let i=state.enemies.length-1; i>=0; i--){    const obj = state.enemies[i];    const el = obj.el;    const r = el.getBoundingClientRect();    let ex = r.left + r.width/2 - gaRect.left;    let ey = r.top  + r.height/2 - gaRect.top;    const dx = state.playerPos.x - ex;    const dy = state.playerPos.y - ey;    const d = Math.hypot(dx,dy);    if(d < minDist) minDist = d;    const desiredAngle = Math.atan2(dy, dx);    const desiredVx = Math.cos(desiredAngle);    const desiredVy = Math.sin(desiredAngle);    const maxSpeed = (state.currentLevel===1? 130 : state.currentLevel===2 ? 160 : 175);    const accel = (state.currentLevel===1? 360 : state.currentLevel===2 ? 420 : 460);    const drag = 0.92;    obj.velX = obj.velX*drag + desiredVx*accel*dt;    obj.velY = obj.velY*drag + desiredVy*accel*dt;    const speed = Math.hypot(obj.velX, obj.velY);    if(speed > maxSpeed){ obj.velX = obj.velX/speed*maxSpeed; obj.velY = obj.velY/speed*maxSpeed; }    ex += obj.velX*dt;    ey += obj.velY*dt;    el.style.left = (ex - r.width/2) + 'px';    el.style.top  = (ey - r.height/2) + 'px';    const er = el.getBoundingClientRect();    if(canHit && intersects(pRect, er)){      el.remove();      state.enemies.splice(i,1);      loseLife();      continue;    }    if(ex < -120 || ex > gameArea.clientWidth+120 || ey < -120 || ey > gameArea.clientHeight+120){      try{ el.remove(); }catch(e){}      state.enemies.splice(i,1);    }  }  updateSpookyPitch(minDist);}/* Münzen */function spawnCoin(){  const c = document.createElement('div');  c.className='coin';  const pad = 40;  const x = rnd(pad, gameArea.clientWidth - pad);  const y = rnd(pad+40, gameArea.clientHeight - pad);  c.style.left = (x - 10) + 'px';  c.style.top  = (y - 10) + 'px';  gameArea.appendChild(c);  state.coinsOnField.push(c);}function updateCoinsCollect(){  const pRect = playerEl.getBoundingClientRect();  for(let i=state.coinsOnField.length-1;i>=0;i--){    const c = state.coinsOnField[i];    const r = c.getBoundingClientRect();    if(intersects(pRect, r)){      state.coins += 1;      state.levelCoins += 1;      updateCoinsUI();      c.remove();      state.coinsOnField.splice(i,1);      showMessage('+1 Münze!', 600);      pingSpooky();    }  }}/* Bäume (nur Level 1) */function makeTree(x, y, scale=1, layer='front'){  const root = document.createElement('div');  root.className = 'tree';  root.style.left = (x)+'px';  root.style.top  = (y)+'px';  root.style.transform = 'scale('+scale+')';  root.style.zIndex = layer==='front' ? 7 : 5;  root.style.opacity = layer==='front' ? '0.98' : '0.75';  const trunk = document.createElement('div');  trunk.className = 'trunk';  trunk.style.setProperty('--lean', (Math.random()<0.5 ? -1 : 1) * (4 + Math.random()*3) + 'deg');  trunk.style.height = (140 + Math.random()*50) + 'px';  trunk.style.width  = (14 + Math.random()*6) + 'px';  root.appendChild(trunk);  const trunkH = parseFloat(trunk.style.height);  const trunkW = parseFloat(trunk.style.width);  const knots = 5 + Math.floor(Math.random()*3);  for(let i=0;i<knots;i++){    const h = 28 + i * (trunkH/(knots+0.5));    const knob = document.createElement('div');    knob.className='knob';    knob.style.left = (trunkW/2 - 3) + 'px';    knob.style.bottom = (h) + 'px';    root.appendChild(knob);  }  return root;}function placeForest(){  treeLayerBack.innerHTML = '';  treeLayerFront.innerHTML = '';  if(state.currentLevel !== 1) return;  const gw = gameArea.clientWidth;  const gh = gameArea.clientHeight;  const rows = [    { y: gh*0.66, count: 7, layer: 'back', scale: 0.75 },    { y: gh*0.70, count: 5, layer: 'front', scale: 1.00 }  ];  for(const row of rows){    for(let i=0;i<row.count;i++){      const x = gw*(0.08 + i*((0.84)/(row.count-1 || 1))) + rnd(-18,18);      const t = makeTree(x, row.y, row.scale, row.layer);      (row.layer==='front' ? treeLayerFront : treeLayerBack).appendChild(t);    }  }}/* Leben */function loseLife(){  state.lives -= 1;  livesEl.textContent = state.lives;  showMessage('Autsch – Leben -1 (kurz geschützt)', 1200);  state.invulnerableUntil = performance.now() + 1000;  playerEl.style.opacity = '0.5';  setTimeout(()=>{ playerEl.style.opacity = '1'; }, 1000);  if(state.lives <= 0){ gameOver(); }  else { resetBoardPositions(); }}function gameOver(){  state.running = false;  showMessage('Vorbei – probier es gleich nochmal!', 2400);  setDpadVisible(false);  nextBtn.style.display = 'none';}/* Level-Deko */function applyLevelDecor(){  // Erst alle ausblenden  nightSky.style.display='none'; nightMoon.style.display='none'; nightGlow.style.display='none';  forestGround.style.display='none'; forestHills.style.display='none'; forestMist.style.display='none';  openSky.style.display='none'; openGlow.style.display='none'; openFloor.style.display='none';  morningSky.style.display='none'; sun.style.display='none'; morningGlow.style.display='none'; morningFloor.style.display='none';  treeLayerBack.innerHTML=''; treeLayerFront.innerHTML='';  if(state.currentLevel===1){    nightSky.style.display='block';    nightMoon.style.display='block';    nightGlow.style.display='block';    forestGround.style.display='block';    forestHills.style.display='block';    forestMist.style.display='block';    levelText.textContent = 'Nachtwald';  }else if(state.currentLevel===2){    openSky.style.display='block';    openGlow.style.display='block';    openFloor.style.display='block';    levelText.textContent = 'Offene Fläche';  }else{    morningSky.style.display='block';    sun.style.display='block';    morningGlow.style.display='block';    morningFloor.style.display='block';    levelText.textContent = 'Heller Morgen';  }}/* LOOP */function gameLoop(ts){  if(!state.running) return;  if(!state.lastTs) state.lastTs = ts;  const dt = Math.min(0.05, (ts - state.lastTs)/1000);  state.lastTs = ts;  state.tick++;  const timeLeft = state.levelEndAt - performance.now();  timerEl.textContent = formatTimeLeft(timeLeft);  if(timeLeft <= 0){    levelCompleted();    return;  }  updatePlayer(dt);  updateEnemies(dt);  updateCoinsCollect();  // Gegner-Spawn (steigt leicht je Level)  const enemyInterval = (state.currentLevel===1 ? 28 : state.currentLevel===2 ? 22 : 18);  if(state.tick % enemyInterval === 0){    spawnEnemy();    if(Math.random() < (state.currentLevel===1 ? 0.40 : state.currentLevel===2 ? 0.55 : 0.65)) spawnEnemy();  }  // Münzen-Spawn  if(state.tick % 45 === 0 && state.coinsOnField.length < 5){    spawnCoin();  }  requestAnimationFrame(gameLoop);}function levelCompleted(){  state.running = false;  setDpadVisible(false);  showMessage('Super! Level ' + state.currentLevel + ' geschafft! 🎉', 3000);  if(state.currentLevel < 3){    nextBtn.style.display = 'inline-block';  }else{    nextBtn.style.display = 'none';    showMessage('Klasse! Alle 3 Level geschafft!', 3200);  }}/* Buttons */startBtn.addEventListener('click', ()=>{  state.currentLevel = parseInt(levelSelect.value, 10) || 1;  startLevel();});nextBtn.addEventListener('click', ()=>{  if(state.currentLevel < 3){    state.currentLevel += 1;    levelSelect.value = String(state.currentLevel);    startLevel();  }});resetBtn.addEventListener('click', ()=>{  resetState(); applyPlayerStyle();});levelSelect.addEventListener('change', ()=>{  state.currentLevel = parseInt(levelSelect.value, 10) || 1;  applyLevelDecor();  placeForest();  resetBoardPositions();});toggleShopBtn.addEventListener('click', ()=>{  shopPanel.style.display = shopPanel.style.display==='none' || shopPanel.style.display==='' ? 'block' : 'none';  toggleShopBtn.textContent = (shopPanel.style.display==='block' ? 'Shop schliessen' : 'Shop öffnen');});/* Level Start/Reset */function startLevel(){  nextBtn.style.display = 'none';  applyPlayerStyle();  applyLevelDecor();  placeForest();  resetBoardPositions();  clearBoard();  state.tick = 0;  state.levelEndAt = performance.now() + ONE_MIN_MS; // 1 Minute  timerEl.textContent = '01:00';  state.lastTs = 0;  state.running = true;  state.lives = 3;  livesEl.textContent = state.lives;  setDpadVisible(true);  showMessage('Überlebe 60 Sekunden! Viel Erfolg!', 1200);  requestAnimationFrame(gameLoop);  startSpookyIfWanted();}function clearBoard(){  Array.from(gameArea.querySelectorAll('.enemy')).forEach(n=>n.remove());  Array.from(gameArea.querySelectorAll('.coin')).forEach(n=>n.remove());  state.enemies = [];  state.coinsOnField = [];}function resetState(){  state.running=false;  state.enemies=[];  state.tick=0;  state.levelEndAt=0;  state.invulnerableUntil=0;  timerEl.textContent='01:00';  hideMessage();  clearBoard();  setDpadVisible(false);  applyLevelDecor();  placeForest();  resetBoardPositions();  updateCoinsUI();  applyAccessories();  if(audioCtx){ if(state.soundOn) setVolume(parseFloat(volumeSlider.value)); else setVolume(0); }}/* Resize */window.addEventListener('resize', ()=>{  resetBoardPositions();  placeForest();});/* SOUND – offline, freundlich-spannend */let audioCtx = null;let baseOsc = null;let lfoOsc = null;let gainNode = null;let lfoGain = null;function initAudio(){  if(audioCtx) return;  const AC = window.AudioContext || window.webkitAudioContext;  audioCtx = new AC();  baseOsc = audioCtx.createOscillator();  baseOsc.type = 'sawtooth';  baseOsc.frequency.value = 68;  lfoOsc = audioCtx.createOscillator();  lfoOsc.type = 'sine';  lfoOsc.frequency.value = 0.4;  lfoGain = audioCtx.createGain();  lfoGain.gain.value = 6;  gainNode = audioCtx.createGain();  gainNode.gain.value = 0;  lfoOsc.connect(lfoGain);  lfoGain.connect(baseOsc.frequency);  baseOsc.connect(gainNode);  gainNode.connect(audioCtx.destination);  baseOsc.start();  lfoOsc.start();}function setVolume(v){  if(!audioCtx) return;  const now = audioCtx.currentTime;  gainNode.gain.cancelScheduledValues(now);  gainNode.gain.linearRampToValueAtTime(v, now + 0.08);}function toggleSound(){  if(!audioCtx){ initAudio(); }  state.soundOn = !state.soundOn;  soundBtn.textContent = 'Sound: ' + (state.soundOn ? 'AN' : 'AUS');  const vol = parseFloat(volumeSlider.value);  setVolume(state.soundOn ? vol : 0);}function startSpookyIfWanted(){  if(!audioCtx){ initAudio(); }  soundBtn.textContent = 'Sound: ' + (state.soundOn ? 'AN' : 'AUS');  const vol = parseFloat(volumeSlider.value);  setVolume(state.soundOn ? vol : 0);}function updateSpookyPitch(minDist){  if(!audioCtx || !baseOsc) return;  const base = 68;  const closeness = Math.max(0, Math.min(1, (400 - (minDist||9999)) / 400));  const target = base + closeness * 18;  const now = audioCtx.currentTime;  baseOsc.frequency.cancelScheduledValues(now);  baseOsc.frequency.linearRampToValueAtTime(target, now + 0.06);}function pingSpooky(){  if(!audioCtx || !baseOsc) return;  const now = audioCtx.currentTime;  const f = baseOsc.frequency;  const current = f.value;  f.cancelScheduledValues(now);  f.setValueAtTime(current, now);  f.linearRampToValueAtTime(current + 28, now + 0.04);  f.linearRampToValueAtTime(current, now + 0.20);}soundBtn.addEventListener('click', ()=>{ toggleSound(); });volumeSlider.addEventListener('input', ()=>{  if(!audioCtx) return;  if(state.soundOn){    setVolume(parseFloat(volumeSlider.value));  }});/* SHOP */const SHOP_ITEMS = [  { id:'tshirt', type:'color', name:'T‑Shirt neue Farbe', price: state.prices.tshirt, apply:()=>{ shirtColorInput.value = '#ff5a5a'; applyPlayerStyle(); } },  { id:'pants',  type:'color', name:'Hosen neue Farbe',  price: state.prices.pants,  apply:()=>{ pantsColorInput.value = '#44aa66'; applyPlayerStyle(); } },  { id:'shoes',  type:'color', name:'Schuhe neue Farbe', price: state.prices.shoes,  apply:()=>{ shoeColorInput.value  = '#333333'; applyPlayerStyle(); } },  { id:'hat',    type:'acc',   name:'Hut',               price: state.prices.hat,    apply:()=>{ state.owned.hat=true; applyAccessories(); } },  { id:'scarf',  type:'acc',   name:'Schal',             price: state.prices.scarf,  apply:()=>{ state.owned.scarf=true; applyAccessories(); } },  { id:'pack',   type:'acc',   name:'Rucksack',          price: state.prices.pack,   apply:()=>{ state.owned.pack=true; applyAccessories(); } },  { id:'glasses',type:'acc',   name:'Brille',            price: state.prices.glasses,apply:()=>{ state.owned.glasses=true; applyAccessories(); } }];let purchased = new Set();function buildShop(){  shopGrid.innerHTML = '';  SHOP_ITEMS.forEach(item=>{    const row = document.createElement('div');    row.className = 'shopItem' + (purchased.has(item.id) ? ' owned' : '');    const info = document.createElement('div'); info.className = 'info'; info.textContent = item.name;    const price = document.createElement('div'); price.className = 'price'; price.textContent = item.price + ' Münzen';    const btn = document.createElement('button');    btn.textContent = purchased.has(item.id) ? 'Bereits gekauft' : 'Kaufen';    btn.disabled = purchased.has(item.id);    btn.addEventListener('click', ()=>{      if(purchased.has(item.id)) return;      if(state.coins >= item.price){        state.coins -= item.price;        updateCoinsUI();        purchased.add(item.id);        item.apply();        showMessage('Gekauft: ' + item.name, 1200);        buildShop();      } else {        showMessage('Nicht genug Münzen!', 900);      }    });    row.appendChild(info); row.appendChild(price); row.appendChild(btn);    shopGrid.appendChild(row);  });}/* Init */function initAll(){  applyPlayerStyle();  applyAccessories();  updateCoinsUI();  resetState();  buildShop();  bindDpad();  soundBtn.textContent = 'Sound: ' + (state.soundOn ? 'AN' : 'AUS');}initAll();</script></body></html>
