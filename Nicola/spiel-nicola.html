<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>Schulabenteuer — Tor in L1, Tür in L2 (friedlich)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
:root{
  --sky1:#dff1ff; --sky2:#bfe2ff; --ground:#67b36a;
  --brick:#b96a3c; --brick2:#8b4a25; --ui:#00000099; --accent:#ffd54f;
  --pad:#7c4dff; --puddle:#33a1ff; --mist:#cfd8dc;
  --switchOff:#ffb300; --switchOn:#8bc34a; --snack:#ff8a65; --energy:#4fc3f7;
  --checkpoint:#00c853; --door:#546e7a; --npc:#90a4ae; --teacher:#6d4c41; --teacher2:#5d4037;
  --bossBody:#3949ab; --bossHat:#1a237e; --bossTrim:#ffca28; --bossEyes:#212121;
  --text:#1b1b1b; --gymWall:#f0f5ff; --gymLine:#b0c4ff;
  --hallWall:#f7f7f7; --locker:#90caf9; --doorWood:#a1887f; --schoolBrick:#c26b4e;
  --window:#e3f2fd; --roof:#8d6e63; --coin:#ffd700;
}
html,body{height:100%;margin:0;font-family:system-ui,Segoe UI,Arial,Helvetica,sans-serif;-webkit-tap-highlight-color:transparent;background:#f6fbff;color:var(--text)}
#container{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:8px;box-sizing:border-box}
#game{display:block;background:linear-gradient(var(--sky1), var(--sky2)); touch-action: none;}
#hud{position:fixed; left:8px; top:8px; display:flex; gap:8px; flex-wrap:wrap; z-index:20}
.pill{background:var(--ui); color:#fff; padding:6px 10px; border-radius:10px; font-weight:600}
.meter{height:10px;background:#222;border-radius:6px;overflow:hidden;margin-top:4px}
.meter i{display:block;height:100%;background:#69f0ae;width:100%}
#title{position:fixed; left:50%; top:8px; transform:translateX(-50%); background:#ffffffdd; padding:6px 10px; border-radius:10px; font-weight:800; z-index:20}
#touch{position:fixed; left:10px; bottom:10px; right:10px; display:flex; justify-content:space-between; align-items:flex-end; z-index:20; gap:10px}
#touch .leftCluster{display:flex; gap:8px}
#touch .rightCluster{display:flex; gap:8px; margin-left:auto}
.btn{width:64px;height:64px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.2);font-weight:900;user-select:none;transition:background-color .15s, color .15s, transform .05s}
.small{width:56px;height:56px}
.btn:active{transform:scale(0.97)}
/* Aktive Power-Button-Farben */
.power-active-blue{ background:#1976d2; color:#fff; }
.power-active-purple{ background:#6a1b9a; color:#fff; }
.power-active-darkblue{ background:#1a237e; color:#fff; }
#overlay{position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); background:#000000b0; color:#fff; padding:14px 18px; border-radius:12px; display:none; z-index:50; text-align:center; max-width:90vw}
#panel{position:fixed; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column; gap:14px; background:#000000a8; color:#fff; z-index:60}
#panel.show{display:flex}
#panel button{background:#fff;color:#000; border:none; border-radius:10px; padding:10px 14px; font-weight:800}
.hint{font-size:12px; opacity:.9}
#shopWrap{display:none; position:fixed; inset:0; background:#000000a8; z-index:70; align-items:center; justify-content:center; color:#fff;}
#shop{background:#101418; padding:16px; border-radius:12px; width:90vw; max-width:720px;}
#shop h3{margin:0 0 8px 0}
#shopGrid{display:grid; grid-template-columns: repeat(2, 1fr); gap:10px; margin-top:10px}
.card{background:#1a232b; padding:10px; border-radius:10px}
.row{display:flex; gap:8px; flex-wrap:wrap; align-items:center}
.price{background:#fff; color:#000; padding:2px 8px; border-radius:999px; font-weight:800}
.swatch{width:26px;height:26px;border-radius:6px;border:2px solid #fff; cursor:pointer}
.outfitBtn{background:#fff;border:none;border-radius:8px;padding:6px 10px;font-weight:800;cursor:pointer}
.closeBtn{background:#fff;border:none;border-radius:8px;padding:8px 12px;font-weight:800;margin-top:12px}
</style>
</head>
<body>
<div id="container">
  <canvas id="game" width="960" height="540" aria-label="Schulabenteuer"></canvas>
</div>
<div id="hud">
  <div class="pill">
    Leben <span id="hpV">100</span>
    <div class="meter"><i id="hpM" style="width:100%"></i></div>
  </div>
  <div class="pill">
    Energie <span id="enV">100</span>
    <div class="meter"><i id="enM" style="width:100%"></i></div>
  </div>
  <div class="pill">Münzen <span id="coinV">0</span></div>
  <div class="pill">Power: <span id="pName">Energie-Kugel</span> • Stufe <span id="pLv">1</span></div>
  <div class="pill" id="bossHUD" style="display:none">Boss-HP <span id="bossHPV">1000</span>
    <div class="meter"><i id="bossHPM" style="width:100%"></i></div>
  </div>
</div>
<div id="title">Level 1 — Pausenplatz</div>
<div id="touch" aria-hidden="false">
  <div class="leftCluster">
    <div class="btn small" id="leftBtn">◀</div>
    <div class="btn small" id="rightBtn">▶</div>
  </div>
  <div class="rightCluster">
    <div class="btn" id="jumpBtn">Sprung</div>
    <div class="btn" id="actBtn">Aktion</div>
    <div class="btn small" id="p1Btn" aria-pressed="true">P1</div>
    <div class="btn small" id="p2Btn" aria-pressed="false">P2</div>
    <div class="btn small" id="p3Btn" aria-pressed="false">P3</div>
  </div>
</div>
<div id="overlay"></div>
<div id="panel">
  <div id="pTitle" style="font-size:22px;font-weight:900">—</div>
  <div id="pText" style="max-width:560px">—</div>
  <div class="row">
    <button id="pBtn">Weiter</button>
    <button id="shopBtn">Shop</button>
  </div>
  <div class="hint">Steuerung: ←/→ oder A/D • Springen: Leertaste • Aktion: K/E • Powers: 1/2/3 • Shop: O</div>
</div>
<div id="shopWrap">
  <div id="shop">
    <h3>Shop — Outfits kaufen und anziehen</h3>
    <div class="row">Münzen: <span id="coinShop">0</span></div>
    <div id="shopGrid"></div>
    <div class="row" style="justify-content:flex-end">
      <button class="closeBtn" id="closeShop">Schliessen</button>
    </div>
  </div>
</div>
<script>
/*
Schulabenteuer — L1: Rohr am Ende, L2: Tür am Ende (friedlich)
- L1: Grünes Rohr (wie Mario) am Levelende, Berühren = weiter zu L2.
- L2: Klassische Tür am Levelende, Berühren = weiter zu L3.
- L3: Finale mit magischer Tür nach Boss.
- Friedlich: Bei Berührungen nur Reset, keine Verletzungen.
*/
const CFG = {
  W: 960, H: 540, worldH: 540,
  grav: 1400, speed: 230, jump: 520,
  maxHP: 100, maxEN: 100, regen: 8,
  camLag: 0.15
};
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const hpV = document.getElementById('hpV'), hpM = document.getElementById('hpM');
const enV = document.getElementById('enV'), enM = document.getElementById('enM');
const coinV = document.getElementById('coinV');
const pName = document.getElementById('pName'), pLv = document.getElementById('pLv');
const overlay = document.getElementById('overlay');
const panel = document.getElementById('panel');
const pTitle = document.getElementById('pTitle');
const pText = document.getElementById('pText');
const pBtn = document.getElementById('pBtn');
const title = document.getElementById('title');
const shopWrap = document.getElementById('shopWrap');
const shopGrid = document.getElementById('shopGrid');
const closeShop = document.getElementById('closeShop');
const coinShop = document.getElementById('coinShop');
const shopBtn = document.getElementById('shopBtn');
const bossHUD = document.getElementById('bossHUD');
const bossHPV = document.getElementById('bossHPV');
const bossHPM = document.getElementById('bossHPM');
// Power-Buttons
const p1Btn = document.getElementById('p1Btn');
const p2Btn = document.getElementById('p2Btn');
const p3Btn = document.getElementById('p3Btn');

// Input
let keys={}, touch={left:false,right:false,jump:false,action:false};
function bindBtn(id, prop){
  const el=document.getElementById(id);
  el.addEventListener('touchstart', e=>{e.preventDefault(); touch[prop]=true;});
  el.addEventListener('touchend', e=>{e.preventDefault(); touch[prop]=false;});
  el.addEventListener('mousedown', e=>{e.preventDefault(); touch[prop]=true;});
  document.addEventListener('mouseup', ()=>{touch[prop]=false;});
}
bindBtn('leftBtn','left'); bindBtn('rightBtn','right'); bindBtn('jumpBtn','jump'); bindBtn('actBtn','action');
p1Btn.addEventListener('click', ()=>setPower(0));
p2Btn.addEventListener('click', ()=>setPower(1));
p3Btn.addEventListener('click', ()=>setPower(2));

window.addEventListener('keydown', e=>{
  const k=e.key.toLowerCase();
  if(['arrowleft','arrowright','arrowup',' '].includes(e.key)) e.preventDefault();
  if(k==='arrowleft'||k==='a') keys.left=true;
  if(k==='arrowright'||k==='d') keys.right=true;
  if(k===' '||k==='w'||k==='arrowup') keys.jump=true;
  if(k==='k'||k==='e') keys.action=true;
  if(k==='1') setPower(0);
  if(k==='2') setPower(1);
  if(k==='3') setPower(2);
  if(k==='o') openShop();
});
window.addEventListener('keyup', e=>{
  const k=e.key.toLowerCase();
  if(k==='arrowleft'||k==='a') keys.left=false;
  if(k==='arrowright'||k==='d') keys.right=false;
  if(k===' '||k==='w'||k==='arrowup') keys.jump=false;
  if(k==='k'||k==='e') keys.action=false;
});

function msg(text, ms=1200){ overlay.textContent=text; overlay.style.display='block'; clearTimeout(msg._t); msg._t=setTimeout(()=>overlay.style.display='none', ms); }
function showPanel(t, txt, btn='Weiter'){ pTitle.textContent=t; pText.textContent=txt; pBtn.textContent=btn; panel.classList.add('show'); }
function hidePanel(){ panel.classList.remove('show'); }
shopBtn.addEventListener('click', ()=>openShop());

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function AABB(A,B){return A.x<B.x+B.w && A.x+A.w>B.x && A.y<B.y+B.h && A.y+A.h>B.y;}

// Player
const player = {
  x:80,y:360,w:28,h:46,vx:0,vy:0,on:false,face:1,
  hp:CFG.maxHP,en:CFG.maxEN,inv:0,
  coins:0,
  outfit:{shirt:'#1976d2', hat:'#c62828', shoes:'#6d4c41'}
};
let camX=0;

// Outfits & Shop
const OUTFITS = [
  {id:'classic', name:'Classic (blau)', price:0, colors:{shirt:'#1976d2', hat:'#c62828', shoes:'#6d4c41'}},
  {id:'gruen', name:'Grün', price:10, colors:{shirt:'#2e7d32', hat:'#1b5e20', shoes:'#4e342e'}},
  {id:'rot', name:'Rot', price:15, colors:{shirt:'#c62828', hat:'#8e0000', shoes:'#5d4037'}},
  {id:'lila', name:'Lila', price:18, colors:{shirt:'#6a1b9a', hat:'#4a148c', shoes:'#4e342e'}},
  {id:'sonnig', name:'Sonnig', price:20, colors:{shirt:'#f9a825', hat:'#f57f17', shoes:'#6d4c41'}},
  {id:'meer', name:'Meer', price:22, colors:{shirt:'#0288d1', hat:'#01579b', shoes:'#004d40'}},
  {id:'wald', name:'Wald', price:24, colors:{shirt:'#1b5e20', hat:'#33691e', shoes:'#3e2723'}},
  {id:'beere', name:'Beere', price:26, colors:{shirt:'#ad1457', hat:'#880e4f', shoes:'#4e342e'}},
  {id:'neon', name:'Neon', price:28, colors:{shirt:'#00e676', hat:'#1de9b6', shoes:'#00c853'}},
  {id:'nacht', name:'Nacht', price:30, colors:{shirt:'#263238', hat:'#37474f', shoes:'#000000'}}
];
let ownedOutfits = new Set(['classic']);
let currentOutfit = 'classic';
function applyOutfit(id){
  const o = OUTFITS.find(x=>x.id===id); if(!o) return;
  player.outfit = {...o.colors};
  currentOutfit = id;
  msg('Outfit: '+o.name, 900);
}
function buildShop(){
  shopGrid.innerHTML = '';
  OUTFITS.forEach(o=>{
    const div = document.createElement('div'); div.className='card';
    const owned = ownedOutfits.has(o.id);
    div.innerHTML = `
      <div style="font-weight:900;margin-bottom:6px">${o.name}</div>
      <div class="row">
        <div class="swatch" style="background:${o.colors.shirt}"></div>
        <div class="swatch" style="background:${o.colors.hat}"></div>
        <div class="swatch" style="background:${o.colors.shoes}"></div>
        <span class="price">${o.price} Münzen</span>
      </div>
      <div class="row" style="margin-top:8px">
        <button class="outfitBtn">${owned?'Anziehen':'Kaufen'}</button>
      </div>`;
    const btn = div.querySelector('.outfitBtn');
    btn.addEventListener('click', ()=>{
      if(owned){
        applyOutfit(o.id);
        updateHUD();
      }else{
        if(player.coins >= o.price){
          player.coins -= o.price;
          ownedOutfits.add(o.id);
          applyOutfit(o.id);
          buildShop();
          updateHUD();
          msg('Gekauft: '+o.name, 900);
        }else{
          msg('Zu wenig Münzen!', 900);
        }
      }
    });
    shopGrid.appendChild(div);
  });
  coinShop.textContent = player.coins;
}
function openShop(){ buildShop(); shopWrap.style.display='flex'; }
function closeShopFn(){ shopWrap.style.display='none'; }
closeShop.addEventListener('click', closeShopFn);
shopWrap.addEventListener('click', (e)=>{ if(e.target===shopWrap) closeShopFn(); });

// Powers
const POWERS = [
  { id:'energy', name:'Energie-Kugel', level:1, cd:0, baseCost:12 },
  { id:'snack', name:'Snack-Wurf', level:1, cd:0, baseCost:10 },
  { id:'wind', name:'Wirbelwind-Sprung', level:1, cd:0, baseCost:16 },
];
let currentPower = 0;
function updatePowerButtons(){
  p1Btn.classList.remove('power-active-blue','power-active-purple','power-active-darkblue');
  p2Btn.classList.remove('power-active-blue','power-active-purple','power-active-darkblue');
  p3Btn.classList.remove('power-active-blue','power-active-purple','power-active-darkblue');
  p1Btn.setAttribute('aria-pressed','false');
  p2Btn.setAttribute('aria-pressed','false');
  p3Btn.setAttribute('aria-pressed','false');
  if(currentPower===0){ p1Btn.classList.add('power-active-blue'); p1Btn.setAttribute('aria-pressed','true'); }
  if(currentPower===1){ p2Btn.classList.add('power-active-purple'); p2Btn.setAttribute('aria-pressed','true'); }
  if(currentPower===2){ p3Btn.classList.add('power-active-darkblue'); p3Btn.setAttribute('aria-pressed','true'); }
}
function setPower(i){
  currentPower = i;
  pName.textContent = POWERS[i].name;
  pLv.textContent = POWERS[i].level;
  updatePowerButtons();
}
function powerStats(p){
  const lv = clamp(p.level,1,10);
  if(p.id==='energy'){ return {speed: 420+lv*40, size: 8+lv*1.5, cost: Math.max(4, p.baseCost - lv), cooldown: Math.max(0.08, 0.6 - lv*0.05)}; }
  if(p.id==='snack'){ return {speed: 360+lv*30, size: 10+lv*1.2, cost: Math.max(4, p.baseCost - lv), cooldown: Math.max(0.1, 0.7 - lv*0.05)}; }
  if(p.id==='wind'){ return {boost: 520 + lv*45, radius: 40 + lv*6, push: 180 + lv*22, dur: 220 + lv*20, cost: Math.max(6, p.baseCost - lv), cooldown: Math.max(0.25, 1.3 - lv*0.09)}; }
  return {};
}

// World containers
let world=null, tiles=[], exits=[], hazards=[], pads=[], switches=[], doors=[], students=[], mists=[], pickups=[], checkpoints=[], boss=null, books=[];
let projectiles=[]; // energy/snack
let windBursts=[];
let coins=[];
let teachers=[];
let teacherZones=[];

// Level 1 — mit grünem Rohr am Ende
function L1(){
  const W=2400;
  const plats=[
    {x:0,y:460,w:W,h:80,type:'ground'},
    {x:160,y:390,w:140,h:18},{x:360,y:350,w:120,h:18},
    {x:620,y:360,w:150,h:18},{x:920,y:320,w:140,h:18},
    {x:1200,y:360,w:150,h:18},{x:1480,y:330,w:150,h:18},
    {x:1760,y:300,w:180,h:18}
  ];
  const hz=[{x:260,y:460,w:120,h:60,type:'puddle'}];
  const sw=[{x:980,y:300,w:20,h:20,on:false}];
  const dr=[{x:1160,y:340,w:40,h:120,open:false, key:'S1'}];
  const stu=[{x:520,y:330,w:26,h:36,hungry:true,help:false,need:'snack', text:'Hast du einen Snack?'}];
  const pu=[{x:200,y:380,w:20,h:20,type:'energy+'},{x:800,y:300,w:20,h:20,type:'snack+'}];
  const ex=[{x:2100,y:380,w:60,h:120,to:1, style:'pipe'}]; // Rohr-Gate
  const cps=[{x:1320,y:448,w:24,h:24,active:false}];
  const cns=[
    {x:140,y:370,r:10},{x:220,y:370,r:10},{x:300,y:370,r:10},{x:340,y:330,r:10},{x:420,y:330,r:10},
    {x:520,y:330,r:10},{x:640,y:340,r:10},{x:720,y:340,r:10},{x:820,y:340,r:10},
    {x:980,y:290,r:10},{x:1060,y:290,r:10},{x:1140,y:290,r:10},
    {x:1240,y:330,r:10},{x:1320,y:330,r:10},{x:1400,y:330,r:10},
    {x:1560,y:290,r:10},{x:1640,y:290,r:10},{x:1720,y:290,r:10},
    {x:1840,y:290,r:10},{x:1920,y:290,r:10},{x:2000,y:290,r:10}
  ];
  const tchs = [
    {x:720,y:314,w:36,h:64,dir:1,range:[700,860], active:true, zoneId:'z1'},
    {x:1550,y:270,w:36,h:64,dir:-1,range:[1480,1630], active:true, zoneId:'z1b'}
  ];
  const zones=[
    {id:'z1', x:680, y:260, w:260, h:160, need:'snack', solved:false, tip:'Snack hier nutzen, dann gehen Lehrkräfte zur Seite.'},
    {id:'z1b', x:1480, y:220, w:200, h:160, need:'energy', solved:false, tip:'Energie-Kugel hier einsetzen.'}
  ];
  return {W, plats, hz, pads:[], sw, dr, stu, pu, ex, cps, mist:[], boss:null, books:[], coins:cns, teachers:tchs, zones};
}

// Level 2 — mit klassischer Tür am Ende
function L2(){
  const W=2800;
  const plats=[
    {x:0,y:460,w:W,h:80,type:'ground'},
    {x:280,y:410,w:160,h:18},{x:540,y:370,w:160,h:18},
    {x:820,y:330,w:160,h:18},{x:1120,y:390,w:160,h:18},
    {x:1500,y:420,w:160,h:18},{x:1840,y:360,w:200,h:18},
    {x:2200,y:320,w:200,h:18}
  ];
  const pads=[{x:700,y:452,w:90,h:8,boost:900},{x:1620,y:452,w:90,h:8,boost:820}];
  const hz=[{x:860,y:460,w:140,h:60,type:'puddle'}];
  const sw=[{x:1520,y:400,w:20,h:20,on:false},{x:1860,y:340,w:20,h:20,on:false}];
  const dr=[{x:1720,y:420,w:40,h:80,open:false, key:'S2'}];
  const stu=[{x:980,y:300,w:26,h:36,hungry:true,help:false,need:'snack',text:'Snack, bitte!'}];
  const pu=[{x:600,y:330,w:20,h:20,type:'wind+'}];
  const mist=[{x:1320,y:350,w:140,h:80,thick:true,cleared:false}];
  const ex=[{x:2500,y:380,w:60,h:120,to:2, style:'door'}]; // Tür-Gate
  const cps=[{x:1420,y:448,w:24,h:24,active:false}];
  const cns=[
    {x:300,y:400,r:10},{x:360,y:400,r:10},{x:420,y:400,r:10},
    {x:560,y:360,r:10},{x:620,y:360,r:10},
    {x:820,y:320,r:10},{x:880,y:320,r:10},{x:940,y:320,r:10},
    {x:1120,y:380,r:10},{x:1180,y:380,r:10},
    {x:1500,y:410,r:10},{x:1560,y:410,r:10},
    {x:1840,y:350,r:10},{x:1900,y:350,r:10},{x:1960,y:350,r:10},
    {x:2100,y:300,r:10},{x:2160,y:300,r:10},{x:2220,y:300,r:10}
  ];
  const tchs = [
    {x:520,y:364,w:36,h:64,dir:1,range:[500,700], active:true, zoneId:'z2'},
    {x:1200,y:372,w:36,h:64,dir:-1,range:[1120,1280], active:true, zoneId:'z2b'}
  ];
  const zones=[
    {id:'z2', x:500, y:310, w:260, h:160, need:'wind', solved:false, tip:'Wirbelwind nutzen, Nebel/Lehrkräfte räumen frei.'},
    {id:'z2b', x:1100, y:320, w:240, h:160, need:'energy', solved:false, tip:'Energie-Kugel einsetzen, Schalter treffen.'}
  ];
  return {W, plats, hz, pads, sw, dr, stu, pu, ex, cps, mist, boss:null, books:[], coins:cns, teachers:tchs, zones};
}

// Level 3 — Finale wie gehabt
function L3(){
  const W=3800;
  const plats=[
    {x:0,y:460,w:W,h:80,type:'ground'},
    {x:360,y:420,w:150,h:18},{x:640,y:380,w:150,h:18},{x:920,y:340,w:150,h:18},
    {x:1240,y:360,w:160,h:18},{x:1540,y:320,w:160,h:18},
    {x:1860,y:420,w:180,h:18},{x:2180,y:390,w:140,h:18},{x:2480,y:360,w:160,h:18},{x:2800,y:330,w:150,h:18},
    {x:3100,y:420,w:220,h:18}
  ];

const LEVELS=[L1,L2,L3];
let curLevel=0, lastCP=null;

function build(i){
  const L = LEVELS[i]();
  world = {W:L.W, H:CFG.worldH};
  tiles = L.plats.slice();
  hazards = L.hz.slice();
  pads = (L.pads||[]).slice();
  switches = (L.sw||[]).map(s=>({...s}));
  doors = (L.dr||[]).map(d=>({...d}));
  students = (L.stu||[]).map(s=>({...s}));
  pickups = (L.pu||[]).map(p=>({...p}));
  exits = (L.ex||[]).map(e=>({...e}));
  checkpoints = (L.cps||[]).map(c=>({...c}));
  mists = (L.mist||[]).map(m=>({...m}));
  boss = L.boss ? {...L.boss} : null;
  books = [];
  coins = (L.coins||[]).map(c=>({...c, taken:false}));
  teachers = (L.teachers||[]).map(t=>({...t}));
  teacherZones = (L.zones||[]).map(z=>({...z}));

  player.x=80; player.y=360; player.vx=0; player.vy=0; player.on=false; player.inv=0;

  if(i===2){ POWERS.forEach(p=>p.level=10); } else {
    POWERS[0].level = Math.max(POWERS[0].level, 2+i);
    POWERS[1].level = Math.max(POWERS[1].level, 2+i);
    POWERS[2].level = Math.max(POWERS[2].level, 1+i);
  }

  setPower(currentPower);
  updateHUD();

  const name = i===0?'Level 1 — Pausenplatz': i===1?'Level 2 — Turnhalle':'Level 3 — Schulgang (Finale)';
  title.textContent = name + (i===2?' — Powers Stufe 10':'');
  msg(name, 1500);
  lastCP=null;
  projectiles.length=0; windBursts.length=0;
  camX = clamp(player.x - canvas.width/2, 0, world.W-canvas.width);

  // Boss-HUD
  if(i===2 && boss){
    bossHUD.style.display='inline-block';
    bossHPV.textContent = boss.hp;
    bossHPM.style.width = '100%';
  } else {
    bossHUD.style.display='none';
  }
  updatePowerButtons();
}

function updateHUD(){
  hpV.textContent = Math.round(player.hp);
  enV.textContent = Math.round(player.en||CFG.maxEN);
  hpM.style.width = (player.hp/CFG.maxHP*100)+'%';
  enM.style.width = ((player.en||CFG.maxEN)/CFG.maxEN*100)+'%';
  coinV.textContent = player.coins;
  pName.textContent = POWERS[currentPower].name;
  pLv.textContent = POWERS[currentPower].level;
  if(curLevel===2 && boss){
    bossHPV.textContent = boss.hp;
    const pct = Math.max(0, Math.min(1, boss.hp/1000));
    bossHPM.style.width = (pct*100)+'%';
  }
}

// Loop
let prev=0, running=true;
function loop(t){
  if(!prev) prev=t;
  const dt=Math.min((t-prev)/1000, 0.033); prev=t;
  step(dt);
  draw();
  if(running) requestAnimationFrame(loop);
}

function step(dt){
  const inL = !!(keys.left||touch.left), inR=!!(keys.right||touch.right);
  const inJ = !!(keys.jump||touch.jump), inA=!!(keys.action||touch.action);

  POWERS.forEach(p=>{ if(p.cd>0) p.cd-=dt; });

  let move=0; if(inL) move-=1; if(inR) move+=1;
  player.vx = move*CFG.speed;
  if(move!==0) player.face = move>0?1:-1;

  player.vy += CFG.grav*dt;
  player.x += player.vx*dt;
  player.y += player.vy*dt;
  player.on=false;

  for(const p of tiles){
    if(player.x+player.w>p.x && player.x<p.x+p.w){
      const prevBottom = player.y - player.vy*dt + player.h;
      const top = p.y;
      const newBottom = player.y + player.h;
      if(prevBottom<=top && newBottom>=top){
        player.y = top - player.h; player.vy=0; player.on=true;
      }
    }
  }

  if(inJ && player.on){ player.vy = -CFG.jump; player.on=false; }

  player.x = clamp(player.x, 0, world.W-player.w);
  if(player.y>world.H+140) levelReset('Gestürzt – Level neu!');

  for(const pad of pads){
    const feet = {x:player.x, y:player.y+player.h-2, w:player.w, h:4};
    if(AABB(feet,pad) && player.vy>=0){ player.vy = -(pad.boost||900); msg('Boing!',700); }
  }

  for(const h of hazards){
    if(AABB({x:player.x,y:player.y,w:player.w,h:player.h}, h) && h.type==='puddle'){
      levelReset('Ups, Pfütze – Level neu!');
      return;
    }
  }

  for(const c of checkpoints){
    if(!c.active && AABB({x:player.x,y:player.y,w:player.w,h:player.h},c)){
      c.active=true; lastCP={x:c.x, y:c.y-20}; msg('Checkpoint!',900);
    }
  }

  for(const s of switches){
    if(!s.on && AABB({x:player.x,y:player.y,w:player.w,h:player.h}, s)){ s.on=true; onSwitch(s); }
  }

  doors.forEach(d=>{ if(!d.open && ((d.key==='S1' && switches.some(s=>s.on)) || (d.key==='S2' && switches.filter(s=>s.on).length>=2))) d.open=true; });

  for(const stu of students){
    if(stu.hungry){
      for(const pr of projectiles){
        if(!pr.dead && pr.kind==='snack' && AABB({x:pr.x,y:pr.y,w:pr.w,h:pr.h},{x:stu.x,y:stu.y,w:stu.w,h:stu.h})){
          pr.dead=true; stu.hungry=false; stu.help=true; msg('Snack verteilt! Danke!',1000);
          const d = doors.find(d=>!d.open);
          if(d) d.open=true;
        }
      }
    }
  }

  for(const m of mists){
    if(!m.cleared){
      for(const wb of windBursts){
        const dx = (wb.x - (m.x+m.w/2)), dy = (wb.y - (m.y+m.h/2));
        const dist = Math.hypot(dx,dy);
        if(dist < wb.r + Math.max(m.w,m.h)/2){ m.cleared=true; msg('Nebel weg!',900); }
      }
    }
  }

  for(const b of books){
    b.x += b.vx*dt; b.y += b.vy*dt;
    if(b.gravity){ b.vy += 900*dt; }
    if(b.y > 460 - (b.h||80)){ b.y = 460 - (b.h||80); b.vy = 0; b.vx *= 0.92; }
    if(AABB({x:player.x,y:player.y,w:player.w,h:player.h},{x:b.x,y:b.y-b.h,w:b.w,h:b.h})){
      levelReset('Upps! Ein Regal blockiert den Weg – Level neu!');
      return;
    }
    if(b.x < -200 || b.x > world.W+200) b.dead=true;
  }
  for(let i=books.length-1;i>=0;i--){ if(books[i].dead) books.splice(i,1); }

  for(const t of teachers){
    if(!t.active) continue;
    const sp = 60;
    if(t.dir!==0){
      t.x += t.dir*sp*dt;
      if(t.x < t.range[0]){ t.x=t.range[0]; t.dir=1; }
      if(t.x > t.range[1]){ t.x=t.range[1]; t.dir=-1; }
    }
    const rectT = {x:t.x, y:t.y, w:t.w, h:t.h};
    const rectP = {x:player.x, y:player.y, w:player.w, h:player.h};
    if(AABB(rectP, rectT)){
      levelReset('Oh! Bitte Abstand halten – Level neu!');
      return;
    }
  }

  handleZones();

  if(inA) usePower();

  // Projektilbewegung + Boss-Treffer
  for(const pr of projectiles){
    pr.x += pr.vx*dt; pr.y += pr.vy*dt;
    if(pr.kind==='snack'){ pr.vy += 600*dt; }
    if(pr.kind==='energy'){
      for(const s of switches){ if(!s.on && AABB({x:pr.x,y:pr.y,w:pr.w,h:pr.h}, s)){ s.on=true; pr.dead=true; onSwitch(s); } }
    }
    if(curLevel===2 && boss && !boss.defeated && (pr.kind==='energy' || pr.kind==='snack')){
      const bRect = bossRect();
      if(AABB({x:pr.x,y:pr.y,w:pr.w,h:pr.h}, bRect)){
        pr.dead = true;
        damageBoss(30);
      }
    }
    if(pr.x<-80||pr.x>world.W+80||pr.y>world.H+120) pr.dead=true;
  }
  projectiles = projectiles.filter(p=>!p.dead);

  for(const wb of windBursts){
    wb.t -= dt*1000;
    if(curLevel===2 && boss && !boss.defeated){
      const r = bossRect();
      const dx = (r.x+r.w/2) - wb.x, dy = (r.y+r.h/2) - wb.y;
      const dist2 = dx*dx + dy*dy;
      if(dist2 <= wb.r*wb.r && !wb.hitBoss){
        damageBoss(30);
        wb.hitBoss = true;
      }
    }
  }
  windBursts = windBursts.filter(w=>w.t>0);

  // Boss Logik
  if(curLevel===2 && boss){
    boss.cooldown -= dt;
    boss.facing = (player.x + player.w/2) < (boss.x + 14) ? -1 : 1;
    const sees = bossSeesPlayer();
    if(!boss.defeated){
      if(sees && boss.cooldown<=0){
        bossThrowPattern();
        const base = 1.6, min=0.6;
        boss.cooldown = Math.max(min, base - Math.min(1.0, (boss.phase||0)*0.04));
      }
      // Block vorm Tor (bleibt), Hinweis
      const block = {x:3500, y:460-120, w:80, h:120};
      if(AABB({x:player.x,y:player.y,w:player.w,h:player.h}, block)){
        if(player.x+player.w/2 < block.x+block.w/2) player.x=block.x-player.w; else player.x=block.x+block.w;
        player.vx=0;
        msg('Triff den Boss mit Powers. Jeder Treffer: -30 HP!',800);
      }
    }
  }

  // Exits: Berühren = weiter
  for(const ex of exits){
    // Etwas schlankere Kollisionszone am "Körper" des Gates
    const rect = {x:ex.x, y:ex.y-100, w:Math.max(12, (ex.style==='pipe'?22:12)), h:100};
    if(AABB({x:player.x,y:player.y,w:player.w,h:player.h}, rect)){
      if(ex.to==='win'){
        if(ex.locked){ msg('Die magische Tür ist noch zu …',900); }
        else { win(); return; }
      }else{
        curLevel = ex.to;
        showPanel('Level geschafft!', 'Weiter zur nächsten Station …', 'Weiter');
        pBtn.onclick = ()=>{ hidePanel(); build(curLevel); };
        return;
      }
    }
  }

  player.en = clamp((player.en||CFG.maxEN) + CFG.regen*dt, 0, CFG.maxEN);

  for(const c of coins){
    if(!c.taken && circleRectOverlap(c.x, c.y, c.r, {x:player.x,y:player.y,w:player.w,h:player.h})){
      c.taken=true; player.coins += 1; msg('+1 Münze', 700);
    }
  }

  updateHUD();

  const target = clamp(player.x + player.w/2 - canvas.width/2, 0, world.W - canvas.width);
  camX += (target - camX) * CFG.camLag;
}

function onSwitch(s){ msg('Schalter aktiviert!',900); }
function usePower(){
  const p = POWERS[currentPower], stats=powerStats(p);
  if(p.cd>0) return;
  const cost = stats.cost;
  if((player.en||CFG.maxEN) < cost){ msg('Nicht genug Energie',800); return; }
  player.en -= cost; p.cd = stats.cooldown;

  if(p.id==='energy'){
    const dir = player.face>=0?1:-1;
    projectiles.push({kind:'energy', x:player.x+(dir>0?player.w:-stats.size), y:player.y+16, w:stats.size, h:stats.size, vx:dir*stats.speed, vy:0});
    msg('Energie-Kugel!',600);
  }else if(p.id==='snack'){
    const dir = player.face>=0?1:-1;
    projectiles.push({kind:'snack', x:player.x+(dir>0?player.w:-stats.size), y:player.y+10, w:stats.size, h:stats.size, vx:dir*stats.speed, vy:-220});
    msg('Snack-Wurf!',600);
  }else if(p.id==='wind'){
    if(player.on){ player.vy = -stats.boost; player.on=false; }
    windBursts.push({x:player.x+player.w/2, y:player.y+player.h/2, r:stats.radius, push:stats.push, t:stats.dur});
    msg('Wirbelwind!',600);
  }
  updateHUD();
}

// Zonen-Logik
function handleZones(){
  if(!teacherZones.length) return;
  for(const z of teacherZones){
    if(z.solved) continue;
    if(AABB({x:player.x,y:player.y,w:player.w,h:player.h},{x:z.x,y:z.y,w:z.w,h:z.h})){
      msg(z.tip || 'Nutze hier die passende Power!', 500);
    }
    for(const pr of projectiles){
      if(pr.dead) continue;
      const inZone = AABB({x:pr.x,y:pr.y,w:pr.w,h:pr.h},{x:z.x,y:z.y,w:z.w,h:z.h});
      if(inZone){
        if((z.need==='energy' && pr.kind==='energy') || (z.need==='snack' && pr.kind==='snack')){
          z.solved=true; pr.dead=true;
          deactivateTeachersInZone(z);
          msg('Rätsel gelöst — Lehrkräfte gehen zur Seite!',1000);
        }
      }
    }
    for(const wb of windBursts){
      const hit = circleRectOverlap(wb.x, wb.y, wb.r, {x:z.x,y:z.y,w:z.w,h:z.h});
      if(hit && z.need==='wind'){
        z.solved=true;
        deactivateTeachersInZone(z);
        msg('Rätsel gelöst — Lehrkräfte gehen zur Seite!',1000);
      }
    }
  }
}
function deactivateTeachersInZone(z){
  for(const t of teachers){
    if(!t.active) continue;
    const rectT = {x:t.x, y:t.y, w:t.w, h:t.h};
    if(AABB(rectT, {x:z.x, y:z.y, w:z.w, h:z.h})){
      t.active=false;
    }
  }
}

function levelReset(reasonText){
  msg(reasonText || 'Level neu!', 900);
  const saved = {
    coins: player.coins,
    outfit: {...player.outfit},
    owned: new Set([...ownedOutfits]),
    currentOutfit: currentOutfit,
    powers: POWERS.map(p=>({id:p.id, level:p.level}))
  };
  build(curLevel);
  player.coins = saved.coins;
  player.outfit = saved.outfit;
  ownedOutfits = new Set([...saved.owned]);
  currentOutfit = saved.currentOutfit;
  for(const p of POWERS){
    const s = saved.powers.find(x=>x.id===p.id);
    if(s) p.level = s.level;
  }
  setPower(currentPower);
  updateHUD();
}

function win(){
  showPanel('Geschafft!', 'Du hast das Finale friedlich gemeistert! Die magische Tür ist offen. Schau gern im Shop vorbei.', 'Nochmal spielen');
  pBtn.onclick = ()=>{ hidePanel(); curLevel=0; build(curLevel); };
}

// Geometry helpers
function circleRectOverlap(cx, cy, r, R){
  const closestX = clamp(cx, R.x, R.x+R.w);
  const closestY = clamp(cy, R.y, R.y+R.h);
  const dx = cx-closestX, dy = cy-closestY;
  return dx*dx+dy*dy <= r*r;
}
function bossRect(){
  if(!boss) return {x:0,y:0,w:0,h:0};
  const w=36,h=56;
  return {x:boss.x, y:boss.y-h, w:w, h:h};
}
function bossSeesPlayer(){
  if(!boss) return false;
  const r = bossRect();
  const px = player.x + player.w/2;
  const py = player.y + player.h;
  const by = r.y + r.h;
  const sameY = Math.abs(by - py) < 40;
  const dirOK = (boss.facing<0 && px < r.x) || (boss.facing>0 && px > r.x+r.w);
  const inRange = Math.abs(px - (r.x + r.w/2)) <= (boss.seeRange||700);
  if(!(sameY && dirOK && inRange)) return false;
  // keine geschlossene Tür direkt dazwischen
  const minX = Math.min(px, r.x + r.w/2), maxX = Math.max(px, r.x + r.w/2);
  for(const d of doors){
    if(!d.open){
      const dx0 = d.x, dx1 = d.x + d.w;
      const dy0 = d.y - d.h, dy1 = d.y;
      const lineY = r.y + 20;
      const intersectsY = (lineY >= dy0 && lineY <= dy1);
      const intersectsX = (dx0 <= maxX && dx1 >= minX);
      if(intersectsX && intersectsY) return false;
    }
  }
  return true;
}
function bossThrowPattern(){
  if(!boss) return;
  const anchorX = boss.facing<0 ? bossRect().x - 10 : bossRect().x + bossRect().w + 10;
  const baseY = 420-20;
  const phase = boss.phase||0;
  const pattern = phase % 3;
  const dir = boss.facing<0 ? -1 : 1;
  if(pattern===0){
    for(let i=0;i<3;i++){
      books.push({x:anchorX, y:baseY, w:50, h:80, vx:dir*(180 + i*20), vy:0, gravity:false});
    }
  }else if(pattern===1){
    for(let i=0;i<2;i++){
      books.push({x:anchorX, y:baseY-120, w:50, h:80, vx:dir*(80 + i*30), vy:0, gravity:true});
    }
  }else{
    books.push({x:anchorX, y:baseY-30, w:50, h:80, vx:dir*(220), vy:0, gravity:false});
    books.push({x:anchorX, y:baseY-30, w:50, h:80, vx:dir*(200), vy:0, gravity:false});
  }
}

// Boss Schaden
function damageBoss(amount){
  if(!boss || boss.defeated) return;
  boss.hp = Math.max(0, boss.hp - amount);
  boss.hits = (boss.hits||0) + 1;
  msg('Treffer! -'+amount+' HP • Boss: '+boss.hp+'/1000', 700);
  if(boss.hp<=0){
    boss.defeated = true;
    msg('„Toll gemeistert! Die Tür öffnet sich.“',1400);
    const exit = exits.find(e=>e.to==='win');
    if(exit) exit.locked=false;
    boss.open=true;
  }else{
    boss.phase = (boss.phase||0)+1;
  }
  updateHUD();
}

// Drawing helpers
function drawBrick(x,y,w,h){
  ctx.fillStyle='var(--brick)'; ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='var(--brick2)'; ctx.lineWidth=2; ctx.strokeRect(x,y,w,h);
  ctx.beginPath();
  ctx.moveTo(x, y+h/2); ctx.lineTo(x+w, y+h/2);
  ctx.moveTo(x+w/3, y); ctx.lineTo(x+w/3, y+h);
  ctx.moveTo(x+2*w/3, y); ctx.lineTo(x+2*w/3, y+h);
  ctx.stroke();
}

function drawBackground(){
  if(curLevel===0){
    ctx.save();
    ctx.fillStyle = '#c8e6c9';
    ctx.fillRect(0, 480, world.W, 20);
    const bx=260, by=180, bw=520, bh=220;
    ctx.fillStyle='var(--schoolBrick)'; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='var(--roof)'; ctx.fillRect(bx-10,by-20,bw+20,20);
    ctx.fillStyle='var(--window)';
    for(let r=0;r<3;r++){ for(let c=0;c<6;c++){ ctx.fillRect(bx+30+c*80, by+30+r*60, 48,36); } }
    ctx.fillStyle='#5d4037'; ctx.fillRect(bx+bw/2-30, by+bh-60, 60,60);
    ctx.restore();
  } else if(curLevel===1){
    ctx.save();
    ctx.fillStyle='var(--gymWall)'; ctx.fillRect(0,0,world.W,300);
    ctx.strokeStyle='var(--gymLine)'; ctx.lineWidth=2;
    for(let x=0;x<world.W;x+=140){ ctx.beginPath(); ctx.moveTo(x,280); ctx.lineTo(x+80,260); ctx.stroke(); }
    ctx.fillStyle='#ffecb3'; ctx.fillRect(300,40,120,26);
    ctx.fillStyle='#bbdefb'; ctx.fillRect(560,40,120,26);
    ctx.fillStyle='#ffcdd2'; ctx.fillRect(820,40,120,26);
    ctx.restore();
  } else {
    ctx.save();
    ctx.fillStyle='var(--hallWall)'; ctx.fillRect(0,0,world.W,320);
    for(let x=200;x<world.W;x+=600){
      ctx.fillStyle='var(--doorWood)'; ctx.fillRect(x,220,80,120);
      ctx.fillStyle='#3e2723'; ctx.fillRect(x+60,270,8,8);
    }
    for(let row=0; row<2; row++){
      for(let x=100; x<world.W; x+=120){
        ctx.fillStyle='var(--locker)'; ctx.fillRect(x, 240-row*60, 48, 48);
        ctx.fillStyle='#1e88e5'; ctx.fillRect(x+6, 246-row*60, 36, 4);
      }
    }
    ctx.fillStyle='#eeeeee'; ctx.fillRect(0, 500, world.W, 12);
    ctx.restore();
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(-Math.round(camX), 0);
  drawBackground();

  if(curLevel===0){ ctx.fillStyle='#fff59d'; ctx.beginPath(); ctx.arc(120,80,36,0,Math.PI*2); ctx.fill(); }

  ctx.fillStyle='var(--ground)'; ctx.fillRect(0,500, world.W, 40);

  for(const p of tiles){ if(p.type==='ground'){ ctx.fillStyle='var(--ground)'; ctx.fillRect(p.x,p.y,p.w,p.h); } else { drawBrick(p.x,p.y,p.w,p.h); } }
  for(const h of hazards){ if(h.type==='puddle'){ ctx.fillStyle='var(--puddle)'; ctx.globalAlpha=.9; ctx.fillRect(h.x,h.y,h.w,h.h); ctx.globalAlpha=1; } }
  for(const pd of pads){ ctx.fillStyle='var(--pad)'; ctx.fillRect(pd.x,pd.y,pd.w,pd.h); ctx.strokeStyle='#4a2fb3'; ctx.strokeRect(pd.x,pd.y,pd.w,pd.h); }
  for(const s of switches){ ctx.fillStyle = s.on?'var(--switchOn)':'var(--switchOff)'; ctx.fillRect(s.x,s.y,s.w,s.h); }
  for(const d of doors){ if(!d.open){ ctx.fillStyle='var(--door)'; ctx.fillRect(d.x,d.y-d.h,d.w,d.h); } }
  for(const st of students){
    ctx.fillStyle='var(--npc)'; ctx.fillRect(st.x, st.y-st.w, st.w, st.w*1.4);
    ctx.fillStyle='#fff'; ctx.fillRect(st.x+8, st.y-st.w+8, 8,8);
  }
  for(const m of mists){
    if(!m.cleared){
      ctx.fillStyle='var(--mist)'; ctx.globalAlpha=0.8; ctx.fillRect(m.x, m.y, m.w, m.h); ctx.globalAlpha=1;
    }
  }

  // Gates am Levelende zeichnen
  for(const ex of exits){
    if(ex.style==='pipe'){
      // Grünes Rohr: Schaft + Rand
      const shaftW = 26, shaftH = 100;
      const topW = 52, topH = 18;
      ctx.fillStyle = '#2e7d32';
      ctx.fillRect(ex.x, ex.y-shaftH, shaftW, shaftH);
      ctx.fillStyle = '#1b5e20';
      ctx.fillRect(ex.x-13, ex.y-shaftH-topH, topW, topH);
      ctx.strokeStyle = '#0f3d11';
      ctx.strokeRect(ex.x, ex.y-shaftH, shaftW, shaftH);
      ctx.strokeRect(ex.x-13, ex.y-shaftH-topH, topW, topH);
      ctx.fillStyle='#1a1a1a'; ctx.fillText('Rohr', ex.x-8, ex.y-shaftH-topH-6);
    } else if(ex.style==='door'){
      // Klassische Tür
      const doorW = 26, doorH = 100;
      ctx.fillStyle = '#6d4c41';
      ctx.fillRect(ex.x, ex.y-doorH, doorW, doorH);
      ctx.fillStyle = '#3e2723';
      ctx.fillRect(ex.x+doorW-8, ex.y-doorH+50, 6, 6); // "Klinke"
      ctx.strokeStyle = '#2b1b12';
      ctx.strokeRect(ex.x, ex.y-doorH, doorW, doorH);
      ctx.fillStyle='#1a1a1a'; ctx.fillText('Tür', ex.x, ex.y-doorH-6);
    } else if(ex.to==='win'){
      // Finale magische Tür (bestehend)
      ctx.fillStyle='#1a1a1a'; ctx.fillText('Magische Tür', ex.x-20, ex.y-110);
      ctx.fillStyle = ex.locked?'#6a1b9a':'#8bc34a';
      ctx.globalAlpha=0.75; ctx.fillRect(ex.x, ex.y-100, 12, 100); ctx.globalAlpha=1;
    }
  }

  // Boss
  if(boss){
    const r=bossRect();
    ctx.fillStyle='#263238'; ctx.fillRect(r.x+4, r.y+r.h-6, r.w-8, 6);
    ctx.fillStyle='var(--bossBody)'; ctx.fillRect(r.x+4, r.y+16, r.w-8, r.h-22);
    ctx.fillStyle='var(--bossTrim)'; ctx.fillRect(r.x+6, r.y+22, r.w-12, 4);
    ctx.fillStyle='#ffe0b2'; ctx.fillRect(r.x+6, r.y+2, r.w-12, 14);
    if(boss.facing>0){ ctx.fillStyle='var(--bossEyes)'; ctx.fillRect(r.x+r.w-14, r.y+8, 3,3); }
    else { ctx.fillStyle='var(--bossEyes)'; ctx.fillRect(r.x+12, r.y+8, 3,3); }
    ctx.fillStyle='var(--bossHat)'; ctx.fillRect(r.x+4, r.y, r.w-8, 5);
  }

  for(const b of books){ ctx.fillStyle='#8d6e63'; ctx.fillRect(b.x, b.y-(b.h||80), b.w||50, b.h||80); }
  for(const c of coins){
    if(!c.taken){
      ctx.fillStyle='var(--coin)';
      ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle='#b28900'; ctx.stroke();
    }
  }
  for(const t of teachers){
    if(!t.active) continue;
    ctx.fillStyle='var(--teacher)';
    ctx.fillRect(t.x, t.y, t.w, t.h*0.75);
    ctx.fillStyle='var(--teacher2)';
    ctx.fillRect(t.x+6, t.y-18, t.w-12, 18);
    ctx.fillStyle='#fff';
    ctx.fillRect(t.x+10, t.y-12, 4,4);
    ctx.fillRect(t.x+t.w-14, t.y-12, 4,4);
  }
  for(const z of teacherZones){
    if(z.solved) continue;
    ctx.globalAlpha=0.12;
    ctx.fillStyle= z.need==='energy'?'#4fc3f7': z.need==='snack'?'#ff8a65':'#80deea';
    ctx.fillRect(z.x, z.y, z.w, z.h);
    ctx.globalAlpha=1;
  }
  for(const c of checkpoints){ ctx.fillStyle = c.active?'var(--checkpoint)':'#9e9e9e'; ctx.fillRect(c.x,c.y,c.w,c.w); }

  for(const pr of projectiles){
    ctx.fillStyle = pr.kind==='energy'?'#4fc3f7':'#ff8a65';
    ctx.beginPath(); ctx.arc(pr.x+pr.w/2, pr.y+pr.h/2, Math.max(6, pr.w/2), 0, Math.PI*2); ctx.fill();
  }
  for(const wb of windBursts){
    ctx.strokeStyle='#80deea'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(wb.x, wb.y, wb.r, 0, Math.PI*2); ctx.stroke();
  }

  drawPlayer();
  ctx.restore();

  ctx.fillStyle='#1a1a1a'; ctx.font='14px sans-serif';
  ctx.fillText('Powers: 1=Energie-Kugel, 2=Snack-Wurf, 3=Wirbelwind • Aktion: K/E • Sprung: Leertaste • Shop: O', 10, canvas.height-10);
}

function drawPlayer(){
  const px=player.x, py=player.y, w=player.w, h=player.h;
  const blink = (player.inv>0 && Math.floor(player.inv*12)%2===0);
  if(blink) return;
  ctx.fillStyle=player.outfit.shoes; ctx.fillRect(px+4, py+h-6, w-8, 6);
  ctx.fillStyle=player.outfit.shirt; ctx.fillRect(px+4, py+18, w-8, h-24);
  ctx.fillStyle='#ffd54f'; ctx.fillRect(px+8, py+24, 4,4); ctx.fillRect(px+w-12, py+24, 4,4);
  ctx.fillStyle='#ffcc80'; ctx.fillRect(px+8, py+4, w-16, 12);
  ctx.fillStyle=player.outfit.hat; ctx.fillRect(px+6, py+0, w-12, 6);
  ctx.fillStyle='#212121';
  if(player.face>0){ ctx.fillRect(px+w-14, py+7, 2,2); } else { ctx.fillRect(px+12, py+7, 2,2); }
}

function lateInteractions(){
  for(const pu of pickups){
    if(!pu.taken && AABB({x:player.x,y:player.y,w:player.w,h:player.h}, pu)){
      pu.taken=true;
      if(pu.type==='energy+'){ player.en = clamp((player.en||CFG.maxEN)+20, 0, CFG.maxEN); msg('+20 Energie',800); }
      if(pu.type==='snack+'){ POWERS[1].level = Math.min(10, POWERS[1].level+1); msg('Snack-Wurf Level +1',900); }
      if(pu.type==='wind+'){ POWERS[2].level = Math.min(10, POWERS[2].level+1); msg('Wirbelwind Level +1',900); }
    }
  }
}

// Main
function start(){
  player.en = CFG.maxEN; player.hp = CFG.maxHP;
  curLevel=0;
  build(curLevel);
  showPanel('Willkommen!', 'Neu: Am Ende von Level 1 wartet ein grünes Rohr. Am Ende von Level 2 eine Tür. Berühre sie, um weiterzukommen. Viel Spaß!', 'Los geht’s');
  pBtn.onclick = ()=>{ hidePanel(); requestAnimationFrame(loop); };
}
function afterFrame(){ lateInteractions(); }
(function rafWrap(){
  const _req = window.requestAnimationFrame;
  window.requestAnimationFrame = function(cb){ return _req(function(t){ cb(t); afterFrame(); }); };
})();
start();
</script>
</body>
